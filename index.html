<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamada Fácil</title>
<!--
  ============================================================
  CHAMADA FÁCIL — v5.0 BETA
  ============================================================
  Estrutura geral:
  - Arquivo único HTML/CSS/JS (sem dependências externas, exceto jsPDF)
  - Estado global gerenciado pelo objeto `S` (State)
  - Persistência via localStorage (trocar por API REST na versão final)
  - Autenticação simulada com hash simples (trocar por JWT na versão final)
  - Estrutura preparada para planos de assinatura (ver objeto PLANOS)
  - Código comentado em português para facilitar manutenção

  PARA O PROGRAMADOR:
  - Buscar por "TODO:" para encontrar pontos de evolução
  - Buscar por "PLANO:" para encontrar lógica de assinatura
  - Buscar por "SEGURANÇA:" para pontos que precisam de hardening
  - Buscar por "API:" para onde integrar backend
  ============================================================
-->
<style>
/* ══════════════════════════════════════════════
   CHAMADA FÁCIL — Design System Unificado
   Paleta:
     Escuro principal:  #1a1a2e
     Escuro secundário: #16213e
     Verde primário:    #1D9E75
     Verde hover:       #0F6E56
     Fundo claro:       #f4f6f8
     Card:              #ffffff
     Texto principal:   #111827
     Texto secundário:  #6b7280
     Borda:             #e5e7eb
   Tipografia: 'Segoe UI', system-ui
   Raio padrão: 10px cards, 8px elementos
══════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f8;min-height:100vh;color:#111827}
.app{max-width:500px;margin:0 auto;padding:12px}

/* ── Cabeçalho escuro (padrão em todas as telas) ─ */
.app-header{background:#1a1a2e;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.page-title{font-size:16px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.sub-info{font-size:11px;color:#9ca3af;margin-top:3px}
.escola-info{font-size:11px;color:#5DCAA5;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-top:2px}

/* ── Stats no cabeçalho ──────────────────────── */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:2px}
.stat{background:#16213e;border-radius:8px;padding:9px 10px;text-align:center}
.stat-num{font-size:19px;font-weight:700;color:#fff}
.stat-num.g{color:#5DCAA5}.stat-num.r{color:#F0997B}.stat-num.b{color:#85B7EB}
.stat-label{font-size:10px;color:#9ca3af;margin-top:1px;text-transform:uppercase;letter-spacing:.04em}

/* ── Card de conteúdo (interior claro) ────────── */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-bottom:10px}

/* ── Abas ─────────────────────────────────────── */
.tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:11px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;font-weight:600;transition:all .15s}
.tab:hover{border-color:#1D9E75;color:#1D9E75}
.tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:700}

/* ── Cabeçalho de seção ───────────────────────── */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}

/* ── Botões ───────────────────────────────────── */
.btn-xs{font-size:12px;padding:5px 12px;border:1px solid #1D9E75;border-radius:8px;background:#fff;color:#1D9E75;cursor:pointer;font-weight:700;transition:all .15s}
.btn-xs:hover{background:#1D9E75;color:#fff}
.btn-primary{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;text-transform:uppercase;letter-spacing:.05em;transition:background .15s}
.btn-primary:hover{background:#0F6E56}
.btn-secondary{width:100%;padding:10px;background:#fff;color:#374151;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:600;transition:all .15s}
.btn-secondary:hover{border-color:#1D9E75;color:#1D9E75}
.btn-danger{width:100%;padding:9px;background:#fff;color:#b03030;border:1px solid #fca5a5;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-danger:hover{background:#fff5f5}
.btn-wpp{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:.04em}
.btn-wpp:hover{background:#1da851}
.btn-pdf{width:100%;padding:12px;background:#e53e3e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:.04em}
.btn-pdf:hover{background:#c53030}

/* ── Cards de alunos ──────────────────────────── */
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;transition:all .15s}
.sc.clickable{cursor:pointer}.sc.clickable:hover{border-color:#1D9E75;box-shadow:0 0 0 1px #1D9E7520}
.sc.present-card{border-left:3px solid #1D9E75;background:#f0fdf8}
.sc.absent-card{border-left:3px solid #ef4444;background:#fff8f8}
.sc.justif-card{border-left:3px solid #3b82f6;background:#f0f7ff}
.sc.alert-card{border-left:3px solid #f59e0b}

/* ── Avatar ───────────────────────────────────── */
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av0{background:#1a1a2e;color:#5DCAA5}
.av1{background:#16213e;color:#85B7EB}
.av2{background:#1a1a2e;color:#F0997B}
.av3{background:#16213e;color:#AFA9EC}
.av4{background:#1a1a2e;color:#FAC775}

/* ── Info aluno ───────────────────────────────── */
.si{flex:1;min-width:0}
.sn{font-size:13px;font-weight:600;color:#111827}
.sm{font-size:11px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:6px}

/* ── Badges falta ─────────────────────────────── */
.fb{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.fb.ok{background:#dcfce7;color:#166534}
.fb.warn{background:#fef3c7;color:#92400e}
.fb.bad{background:#fee2e2;color:#991b1b}

/* ── Botão de presença ────────────────────────── */
.chk{width:36px;height:36px;border-radius:50%;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#9ca3af;transition:all .15s;font-weight:700}
.chk:hover{border-color:#1D9E75}
.chk.present{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chk.absent{background:#ef4444;border-color:#ef4444;color:#fff}
.chk.justif{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* ── Modal ────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(10,10,20,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:#111827;text-transform:uppercase;letter-spacing:.04em;padding-bottom:12px;border-bottom:1px solid #e5e7eb}
.cls{background:transparent;border:none;font-size:22px;cursor:pointer;color:#9ca3af;padding:2px 6px;line-height:1}
.cls:hover{color:#374151}

/* ── Formulários ──────────────────────────────── */
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;color:#6b7280;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:10px 12px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111827;font-family:inherit;transition:border-color .15s}
.fi:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 3px #1D9E7515}
textarea.fi{resize:vertical;min-height:70px}
.ni{width:64px;padding:8px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;text-align:center}

/* ── Alertas e mensagens ──────────────────────── */
.alert-banner{background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400e;font-weight:600}
.err{color:#dc2626;font-size:12px;margin-top:6px;text-align:center;font-weight:700;padding:8px;background:#fee2e2;border-radius:6px}

/* ── Histórico ────────────────────────────────── */
.hist-item{padding:10px 0;border-bottom:1px solid #f3f4f6}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px}

/* ── Relatórios ───────────────────────────────── */
.rel-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px;color:#374151}
.rel-row:last-child{border:none}

/* ── Link box ─────────────────────────────────── */
.link-box{background:#f0fdf4;border:1px dashed #1D9E75;border-radius:8px;padding:8px 12px;font-size:11px;color:#0F6E56;word-break:break-all;margin-top:5px;cursor:pointer;font-weight:600}
.link-box:hover{background:#dcfce7}

/* ── Estado vazio ─────────────────────────────── */
.empty-state{text-align:center;padding:32px 16px;color:#9ca3af;font-size:13px}
.divider{border:none;border-top:1px solid #f3f4f6;margin:10px 0}

/* ── Beta box ─────────────────────────────────── */
.beta-box{margin-top:16px;padding:14px;background:#f0fdf4;border-radius:10px;border:1.5px dashed #1D9E75}
.beta-title{font-size:10px;font-weight:700;color:#0F6E56;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.beta-btn{width:100%;text-align:center;padding:11px 12px;margin-bottom:7px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600;color:#111827;transition:all .15s}
.beta-btn:last-child{margin-bottom:0}
.beta-btn:hover{border-color:#1D9E75;color:#1D9E75}
.beta-hint{font-size:11px;color:#9ca3af}

/* ── Timeline ─────────────────────────────────── */
.timeline{padding:4px 0}
.tl-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.tl-item:last-child{border:none}
.tl-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.tl-present{background:#dcfce7;color:#166534}
.tl-absent{background:#fee2e2;color:#991b1b}
.tl-obs{background:#fef3c7;color:#92400e}
.tl-justif{background:#dbeafe;color:#1e40af}
.tl-date{font-size:11px;color:#9ca3af;margin-bottom:2px}
.tl-text{font-size:13px;color:#111827}

/* ── Obs input ────────────────────────────────── */
.obs-input-row{display:flex;gap:8px;margin-top:10px}
.obs-input-row input{flex:1;padding:9px 12px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit}
.obs-input-row input:focus{outline:none;border-color:#1D9E75}
.obs-input-row button{padding:9px 16px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700}

/* ── Perfil stats ─────────────────────────────── */
.perfil-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.perfil-stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;text-align:center}
.perfil-stat-n{font-size:18px;font-weight:700;color:#111827}
.perfil-stat-l{font-size:10px;color:#6b7280;margin-top:1px;text-transform:uppercase;letter-spacing:.04em}

/* ── Planos ───────────────────────────────────── */
.plano-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
</style>
</head>
<body>
<div class="app" id="root"></div>

<!-- Biblioteca jsPDF para exportação de PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ============================================================
// CONFIGURAÇÃO DE PLANOS
// PLANO: Estrutura preparada para integração com gateway de pagamento
// TODO: Integrar com Stripe, PagSeguro ou MercadoPago na v1.0
// ============================================================
const PLANOS = {
  beta: {
    id: 'beta',
    nome: 'Beta',
    preco: 0,
    maxEscolas: 99,   // ilimitado no beta
    maxTurmas: 99,
    temRelatorio: true,
    temPDF: true,
    temWhatsapp: true,
  },
  basico: {
    id: 'basico',
    nome: 'Básico',
    preco: 29.90,
    maxEscolas: 1,
    maxTurmas: 1,
    temRelatorio: false,
    temPDF: true,
    temWhatsapp: true,
  },
  plus: {
    id: 'plus',
    nome: 'Plus',
    preco: 59.90,
    maxEscolas: 3,
    maxTurmas: 3,
    temRelatorio: true,
    temPDF: true,
    temWhatsapp: true,
  },
  diretor: {
    id: 'diretor',
    nome: 'Diretor',
    preco: 89.90,
    maxEscolas: 1,
    maxTurmas: 99,
    temRelatorio: true,
    temPDF: true,
    temWhatsapp: true,
    temVisaoProfessores: true, // acesso aos professores da escola
  }
};

// ============================================================
// CHAVES DE ARMAZENAMENTO LOCAL
// API: Substituir localStorage por chamadas REST na v1.0
// SEGURANÇA: Dados sensíveis não devem ficar no localStorage em produção
// ============================================================
const DATA_KEY = 'chamadafacil_v6';
const ADM_KEY  = 'chamadafacil_adm_v6';

// ── Sanitização de strings para evitar quebra de HTML/JS ─────
// BUG CORRIGIDO: nomes com apóstrofo (D'Silva) quebravam o modal
function esc(str){ return String(str||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function unesc(str){ return String(str||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>') }

// ── Sanitização de texto para PDF ────────────────────────────
// BUG CORRIGIDO: acentos e caracteres especiais quebravam o jsPDF
function sanitizePDF(str){
  return String(str||'')
    .replace(/[àáâãä]/g,'a').replace(/[ÀÁÂÃÄ]/g,'A')
    .replace(/[èéêë]/g,'e').replace(/[ÈÉÊË]/g,'E')
    .replace(/[ìíîï]/g,'i').replace(/[ÌÍÎÏ]/g,'I')
    .replace(/[òóôõö]/g,'o').replace(/[ÒÓÔÕÖ]/g,'O')
    .replace(/[ùúûü]/g,'u').replace(/[ÙÚÛÜ]/g,'U')
    .replace(/[ç]/g,'c').replace(/[Ç]/g,'C')
    .replace(/[ñ]/g,'n').replace(/[Ñ]/g,'N')
    .replace(/[^\x00-\x7F]/g,'?');
}

// ── Funções utilitárias ──────────────────────────────────────
function uid()      { return Math.random().toString(36).slice(2,9) }
function initials(n){ return (n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase() }
function nowStr()   { return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) }
function today()    { return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) }
function saudacao() { const h=new Date().getHours(); return h>=5&&h<12?'Bom dia':h>=12&&h<18?'Boa tarde':'Boa noite' }
function getParam(k){ try{ return new URLSearchParams(window.location.search).get(k) }catch{ return null } }

// SEGURANÇA: hash simples para senhas — substituir por bcrypt no backend
function hash(s){ let h=0; for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0} return h.toString(36) }

// ── Verificação de limite por plano ──────────────────────────
// BUG CORRIGIDO: limites de planos não eram aplicados de verdade
function checkLimitePlano(profId, tipo){
  const prof = S.professores[profId]; if(!prof) return false;
  const plano = PLANOS[prof.plano||'beta']||PLANOS.beta;
  if(tipo==='turma'){
    const turmasDoProf = Object.values(S.turmas).filter(t=>t.profId===profId).length;
    if(turmasDoProf >= plano.maxTurmas){
      showToast(`Plano ${plano.nome}: limite de ${plano.maxTurmas} turma(s) atingido.`);
      return false;
    }
  }
  if(tipo==='escola'){
    const escolasDoProf = [...new Set(Object.values(S.turmas).filter(t=>t.profId===profId).map(t=>t.escola).filter(Boolean))];
    if(escolasDoProf.length >= plano.maxEscolas && !escolasDoProf.includes(S.editBuf.escola)){
      showToast(`Plano ${plano.nome}: limite de ${plano.maxEscolas} escola(s) atingido.`);
      return false;
    }
  }
  return true;
}

function fc(f,lim){ if(f===0)return'ok'; if(f>=lim)return'bad'; if(f>=lim-2)return'warn'; return'ok' }

// ── Storage (localStorage por enquanto) ─────────────────────
// API: Substituir por fetch('/api/...') na versão com backend
const storage = {
  async get(k)   { try{ const v=localStorage.getItem(k); return v?{value:v}:null }catch{ return null } },
  async set(k,v) { try{ localStorage.setItem(k,v); return{value:v} }catch{ return null } }
};

// ============================================================
// ESTADO GLOBAL DA APLICAÇÃO
// TODO: Migrar para Redux ou Zustand quando virar React/Next.js
// ============================================================
let S = {
  screen:     'loading',
  authRole:   null,
  authProfId: null,
  turmaAtiva: null,
  tab:        'chamada',
  modal:      null,
  loginErr:   '',
  suporteCarregando: false,
  admPassHash: hash('admin123'),
  turmas:      {},
  professores: {},
  escolas:     {},
  editBuf:     {},
  profBuffer:  {},
};

// ── Persistência ─────────────────────────────────────────────
async function loadData() {
  try {
    const [r1,r2] = await Promise.all([storage.get(DATA_KEY), storage.get(ADM_KEY)]);
    if(r1?.value){ const d=JSON.parse(r1.value); S.turmas=d.turmas||{}; S.professores=d.professores||{}; S.escolas=d.escolas||{}; }
    if(r2?.value){ S.admPassHash=r2.value; }
  } catch(e) { console.error('Erro ao carregar dados:', e) }

  const tid  = getParam('turma');
  // BUG CORRIGIDO: usando localStorage em vez de sessionStorage
  const sess = localStorage.getItem('auth_cf6');
  if(sess){
    const p = JSON.parse(sess);
    S.authRole=p.role; S.authProfId=p.profId;
    if(tid&&S.turmas[tid]) S.turmaAtiva=tid;
    else if(p.role==='prof'){ const pr=S.professores[p.profId]; S.turmaAtiva=pr?.turmaId||null; }
    S.screen = p.role==='adm'||p.role==='diretor' ? 'relatorio' : 'chamada';
  } else {
    if(tid&&S.turmas[tid]) S.turmaAtiva=tid;
    S.screen = 'login';
  }
  render();
}

async function save() {
  await storage.set(DATA_KEY, JSON.stringify({turmas:S.turmas, professores:S.professores, escolas:S.escolas}));
  await storage.set(ADM_KEY, S.admPassHash);
}

// BUG CORRIGIDO: sessão some ao fechar a aba — agora usa localStorage
function setSession(role, profId=null) {
  S.authRole=role; S.authProfId=profId;
  // Usando localStorage em vez de sessionStorage para persistir ao fechar a aba
  localStorage.setItem('auth_cf6', JSON.stringify({role,profId,ts:Date.now()}));
}
function logout() {
  S.authRole=null; S.authProfId=null; S.turmaAtiva=null; S.screen='login';
  localStorage.removeItem('auth_cf6');
  render();
}

// ── Autenticação ─────────────────────────────────────────────
function tryLogin(user, pass) {
  S.loginErr = '';
  if(!user||!pass){ S.loginErr='Preencha usuário e senha.'; render(); return; }

  // Login ADM master
  if(user.toLowerCase()==='adm'||user.toLowerCase()==='admin'){
    if(hash(pass)===S.admPassHash){ setSession('adm'); S.screen='relatorio'; S.tab='relatorio'; render(); return; }
    S.loginErr='Senha incorreta.'; render(); return;
  }

  // Login professor/diretor por e-mail
  const prof = Object.values(S.professores).find(p=>p.email.toLowerCase()===user.toLowerCase());
  if(!prof){          S.loginErr='Usuário não encontrado.';        render(); return; }
  if(prof.status==='pendente'){ S.loginErr='Aguardando aprovação do ADM.'; render(); return; }
  if(hash(pass)!==prof.passHash){ S.loginErr='Senha incorreta.';  render(); return; }

  setSession(prof.role||'prof', prof.id);
  S.turmaAtiva = prof.turmaId||null;
  S.screen = prof.role==='diretor' ? 'relatorio' : 'chamada';
  S.tab = 'chamada';
  render();
}

// ── Lógica de chamada ────────────────────────────────────────
function togglePresente(aid) {
  const t=getTurma(); if(!t)return;
  t.alunos = t.alunos.map(a=>{
    if(a.id!==aid) return a;
    const old=a.presente;
    // Ciclo: null → presente → ausente → justificado → null
    let np = old===null?'P' : old==='P'?'F' : old==='F'?'J' : null;
    let nf = a.faltas;
    // Conta falta ao marcar ausente
    if(old==='P' && np==='F') nf++;
    // Desconta falta ao ir de ausente para justificado (não conta)
    if(old==='F' && np==='J') nf=Math.max(0,nf-1);
    // Desconta falta ao limpar de ausente
    if(old==='F' && np===null) nf=Math.max(0,nf-1);
    return {...a, presente:np, faltas:nf};
  });
  save(); render();
}

function salvarChamada() {
  const t=getTurma(); if(!t)return;
  const presentes = t.alunos.filter(a=>a.presente===true);
  const ausentes  = t.alunos.filter(a=>a.presente===false);
  if(!presentes.length&&!ausentes.length){ showToast('Marque ao menos um aluno.'); return; }
  const dataAtual = nowStr();
  t.history.unshift({id:uid(), data:dataAtual, presentes:presentes.map(a=>a.nome), ausentes:ausentes.map(a=>a.nome), total:t.alunos.length});
  if(t.history.length>60) t.history=t.history.slice(0,60);
  // Registra no histórico individual de cada aluno
  t.alunos = t.alunos.map(a=>{
    if(a.presente===null) return a;
    const entrada = {tipo:a.presente===true?'presente':'ausente', data:dataAtual};
    return {...a, presente:null, historico:[entrada,...(a.historico||[])].slice(0,100)};
  });
  save(); render(); showToast('Chamada salva!');
}

// ── Exportação em PDF ────────────────────────────────────────
function gerarPDF(aid){
  const t=getTurma(); if(!t)return;
  const a=t.alunos.find(x=>x.id===aid); if(!a)return;
  const prof=getProf()||{nome:'Escola'};
  const lim=t.limiteFaltas||6;
  const hist=a.historico||[];
  const total=hist.filter(h=>h.tipo==='presente'||h.tipo==='ausente').length;
  const pres=hist.filter(h=>h.tipo==='presente').length;
  const freq=total>0?Math.round(pres/total*100):100;
  const escola=t.escola||'';

  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const W=210; let y=20;

    // Cabeçalho verde
    doc.setFillColor(15,110,86); doc.rect(0,0,W,36,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text('CHAMADA FÁCIL',W/2,13,{align:'center'});
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('Relatório Individual do Aluno',W/2,21,{align:'center'});
    doc.text(`${t.nome}${escola?' — '+escola:''} · Gerado em ${nowStr()}`,W/2,28,{align:'center'});
    y=48;

    // Nome e professor
    doc.setTextColor(17,17,17);
    doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.text(a.nome,14,y); y+=8;
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
    doc.text(`Professor(a): ${prof.nome}   |   Turma: ${t.nome}${escola?' — '+escola:''}`,14,y); y+=10;

    // Blocos de estatísticas
    doc.setFillColor(245,245,245);
    doc.roundedRect(14,y,55,22,3,3,'F');
    doc.roundedRect(75,y,55,22,3,3,'F');
    doc.roundedRect(136,y,60,22,3,3,'F');
    doc.setTextColor(17,17,17); doc.setFontSize(16); doc.setFont('helvetica','bold');
    doc.text(String(a.faltas),41,y+10,{align:'center'});
    doc.text(`${freq}%`,102,y+10,{align:'center'});
    doc.text(String(total),166,y+10,{align:'center'});
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(120,120,120);
    doc.text('FALTAS',41,y+17,{align:'center'});
    doc.text('FREQUÊNCIA',102,y+17,{align:'center'});
    doc.text('AULAS REGISTRADAS',166,y+17,{align:'center'});
    y+=30;

    // Alerta de limite
    if(a.faltas>=lim){
      doc.setFillColor(255,237,213); doc.roundedRect(14,y,W-28,10,2,2,'F');
      doc.setTextColor(180,80,0); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text(`ATENÇÃO: Aluno atingiu o limite de ${lim} faltas.`,W/2,y+7,{align:'center'});
      doc.setTextColor(17,17,17); y+=16;
    }

    // Perfil do aluno
    if(a.obs){
      doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(17,17,17);
      doc.text('PERFIL DO ALUNO',14,y); y+=6;
      doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
      const lines=doc.splitTextToSize(a.obs,W-28);
      doc.text(lines,14,y); y+=lines.length*5+6;
    }

    // Histórico
    if(hist.length>0){
      doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(17,17,17);
      doc.text('HISTÓRICO',14,y); y+=7;
      hist.slice(0,30).forEach(h=>{
        if(y>270){ doc.addPage(); y=20; }
        const label=h.tipo==='presente'?'Presente':h.tipo==='ausente'?'Ausente':'Observação';
        const cor=h.tipo==='presente'?[10,122,78]:h.tipo==='ausente'?[176,48,48]:[100,80,0];
        doc.setFillColor(...(h.tipo==='presente'?[220,252,231]:h.tipo==='ausente'?[255,228,230]:[254,249,195]));
        doc.roundedRect(14,y-4,W-28,h.tipo==='obs'?12:8,2,2,'F');
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...cor);
        doc.text(label,18,y+1);
        doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
        doc.text(h.data,W-14,y+1,{align:'right'});
        if(h.tipo==='obs'&&h.texto){
          doc.setTextColor(60,60,60);
          const tl=doc.splitTextToSize(h.texto,W-60);
          doc.text(tl,18,y+6); y+=tl.length*4+2;
        }
        y+=10;
      });
    }

    // Rodapé
    doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text(`Chamada Fácil · ${nowStr()} · ${prof.nome}`,W/2,290,{align:'center'});
    doc.save(`relatorio_${a.nome.replace(/\s+/g,'_')}.pdf`);
    showToast('PDF gerado com sucesso!');
  } catch(e){ showToast('Erro ao gerar PDF.'); console.error(e); }
}

let suporteHistorico = [];

async function enviarMensagemSuporte(texto) {
  if(!texto?.trim()) return;
  const prof = getProf();

  // Adiciona mensagem do usuário
  suporteHistorico.push({role:'user', content:texto.trim()});
  S.suporteCarregando = true;
  render();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SUPORTE_SYSTEM,
        messages: suporteHistorico
      })
    });
    const data = await resp.json();
    const resposta = data.content?.[0]?.text || 'Desculpe, não consegui processar sua mensagem. Tente novamente!';
    suporteHistorico.push({role:'assistant', content:resposta});
  } catch(e) {
    suporteHistorico.push({role:'assistant', content:'Opa, tive um probleminha técnico aqui 😅 Tente novamente em instantes. Se persistir, manda um e-mail para suporte@chamadafacil.com.br'});
  }

  S.suporteCarregando = false;
  render();
  // Scroll para o final do chat
  setTimeout(()=>{
    const chat = document.getElementById('suporte-chat');
    if(chat) chat.scrollTop = chat.scrollHeight;
  }, 50);
}

        ${S.authRole==='adm'&&!isEdit?`<div class="fl"><label>Turma</label><select class="fi" onchange="S.editBuf.turmaId=this.value"><option value="">Selecione a turma</option>${turmas2.map(t=>`<option value="${t.id}">${t.nome}${t.escola?' — '+t.escola:''}</option>`).join('')}</select></div>`:''}

        <div class="fl"><label>Nome da Turma / Ano *</label><input class="fi" placeholder="Ex: 9º ANO A" oninput="S.editBuf.nome=this.value"></div>
        <div class="fl"><label>Nome da Escola</label><input class="fi" placeholder="Ex: E.E. Prof. João Alves" oninput="S.editBuf.escola=this.value"></div>
        <div class="fl"><label>Professor Responsável</label><select class="fi" onchange="S.editBuf.profId=this.value"><option value="">Sem professor ainda</option>${profs2.map(p=>`<option value="${p.id}">${p.nome}${p.escola?' — '+p.escola:''}</option>`).join('')}</select></div>
        <div class="fl"><label>Limite de Faltas para Alerta</label><input class="ni" type="number" min="1" value="6" oninput="S.editBuf.lim=this.value"></div>
        <button class="btn-primary" onclick="criarTurma()">Criar Turma</button>`;
    }

    // Modal: Editar turma
    if(m.type==='editTurma'){
      const t2=S.turmas[m.tid]; const profs2=Object.values(S.professores).filter(p=>p.status==='ativo');
      mc=`<div class="modal-title">Editar Turma<button class="cls" onclick="closeModal()">×</button></div>
        <div class="fl"><label>Nome da Turma</label><input class="fi" value="${t2.nome}" oninput="S.turmas['${m.tid}'].nome=this.value.toUpperCase();save()"></div>
        <div class="fl"><label>Nome da Escola</label><input class="fi" value="${t2.escola||''}" placeholder="Nome da escola" oninput="S.turmas['${m.tid}'].escola=this.value;save()"></div>
        <div class="fl"><label>Professor</label><select class="fi" onchange="atribuirProfTurma('${m.tid}',this.value)"><option value="">Sem professor</option>${profs2.map(p=>`<option value="${p.id}"${t2.profId===p.id?' selected':''}>${p.nome}</option>`).join('')}</select></div>
        <div class="fl"><label>Limite de Faltas</label><input class="ni" type="number" min="1" value="${t2.limiteFaltas||6}" oninput="S.turmas['${m.tid}'].limiteFaltas=parseInt(this.value)||6;save()"></div>
        <div class="fl"><label>🔗 Link do Professor</label><div class="link-box" onclick="copyLink('${m.tid}')">Toque para copiar o link da turma</div></div>
        <button class="btn-primary" onclick="closeModal()">Fechar</button>
        <button class="btn-danger" onclick="if(confirm('Remover esta turma e todos os dados?')){delete S.turmas['${m.tid}'];save();closeModal();}">Remover Turma</button>`;
    }

    // Modal: Editar professor
    if(m.type==='editProf'){
      const p2=S.professores[m.pid]; const turmas2=Object.values(S.turmas);
      // PLANO: seleção de plano pelo ADM
      mc=`<div class="modal-title">${p2.nome}<button class="cls" onclick="closeModal()">×</button></div>
        <div class="fl"><label>Nome</label><input class="fi" value="${p2.nome}" oninput="S.professores['${m.pid}'].nome=this.value;save()"></div>
        <div class="fl"><label>E-mail</label><input class="fi" value="${p2.email}" oninput="S.professores['${m.pid}'].email=this.value;save()"></div>
        <div class="fl"><label>Escola Principal</label><input class="fi" value="${p2.escola||''}" oninput="S.professores['${m.pid}'].escola=this.value;save()"></div>
        <div class="fl"><label>Tipo de Conta</label><select class="fi" onchange="S.professores['${m.pid}'].role=this.value;save()"><option value="prof"${p2.role==='prof'?' selected':''}>Professor</option><option value="diretor"${p2.role==='diretor'?' selected':''}>Diretor</option></select></div>
        <div class="fl"><label>Plano de Assinatura</label>
          <select class="fi" onchange="S.professores['${m.pid}'].plano=this.value;save()">
            ${Object.values(PLANOS).map(pl=>`<option value="${pl.id}"${(p2.plano||'beta')===pl.id?' selected':''}>${pl.nome}${pl.preco>0?' — R$ '+pl.preco.toFixed(2).replace('.',','):' (Grátis)'}</option>`).join('')}
          </select>
        </div>
        <div class="fl"><label>Turma</label><select class="fi" onchange="atribuirProfTurma(this.value,'${m.pid}')"><option value="">Sem turma</option>${turmas2.map(t=>`<option value="${t.id}"${p2.turmaId===t.id?' selected':''}>${t.nome}${t.escola?' — '+t.escola:''}</option>`).join('')}</select></div>
        <button class="btn-primary" onclick="resetarSenha('${m.pid}')">🔑 Resetar Senha</button>
        <button class="btn-danger" onclick="if(confirm('Remover professor?')){delete S.professores['${m.pid}'];save();closeModal();}">Remover Professor</button>`;
    }

    // Modal: Novo professor (ADM)
    if(m.type==='novoProf'){
      mc=`<div class="modal-title">Novo Professor<button class="cls" onclick="closeModal()">×</button></div>
        <div class="fl"><label>Nome *</label><input class="fi" oninput="S.editBuf.nome=this.value" placeholder="Nome completo"></div>
        <div class="fl"><label>E-mail *</label><input class="fi" type="email" oninput="S.editBuf.email=this.value" placeholder="email@escola.com"><div style="font-size:11px;color:#888;margin-top:3px">Para nota fiscal e comunicações</div></div>
        <div class="fl"><label>Celular <span style="font-size:10px;color:#aaa;font-weight:400">(opcional)</span></label><input class="fi" type="tel" oninput="S.editBuf.celular=this.value" placeholder="(11) 99999-9999" maxlength="15"></div>
        <div class="fl"><label>Escola</label><input class="fi" oninput="S.editBuf.escola=this.value" placeholder="Nome da escola"></div>
        <div class="fl"><label>Tipo de Conta</label><select class="fi" onchange="S.editBuf.role=this.value"><option value="prof">Professor</option><option value="diretor">Diretor</option></select></div>
        <div class="fl"><label>Senha Provisória *</label><input class="fi" type="password" oninput="S.editBuf.senha=this.value" placeholder="Mínimo 4 caracteres"></div>
        <button class="btn-primary" onclick="admCriarProf()">Criar Professor</button>`;
    }

    // Modal: Senha resetada
    if(m.type==='senhaReset'){
      mc=`<div class="modal-title">🔑 Senha Resetada<button class="cls" onclick="closeModal()">×</button></div>
        <div style="font-size:13px;color:#666;margin-bottom:10px">Senha provisória de <strong>${m.nome}</strong>:</div>
        <div style="background:#f0faf6;border:1.5px dashed #1D9E75;border-radius:8px;padding:14px;text-align:center;font-size:24px;font-weight:700;color:#0a7a4e;letter-spacing:3px">${m.senha}</div>
        <div style="font-size:11px;color:#999;margin-top:8px;text-align:center">Compartilhe com o professor e peça para ele trocar.</div>
        <button class="btn-primary" onclick="closeModal()">Fechar</button>`;
    }

    if(mc) html+=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${mc}</div></div>`;
  }

  root.innerHTML = html;
}

// Inicia o app
loadData();
</script>
</body>
</html>
