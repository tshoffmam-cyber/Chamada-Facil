<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamada Fácil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f4f6f8;min-height:100vh;color:#111}
.app{max-width:500px;margin:0 auto;padding:12px;padding-bottom:72px}
.app-header{background:#1a1a2e;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.page-title{font-size:15px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.sub-info{font-size:11px;color:#9ca3af;margin-top:2px}
.escola-info{font-size:11px;color:#5DCAA5;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-top:1px}
.stats-row{display:grid;gap:6px}
.s3{grid-template-columns:1fr 1fr 1fr}
.s4{grid-template-columns:1fr 1fr 1fr 1fr}
.stat{background:#16213e;border-radius:8px;padding:8px 6px;text-align:center}
.stat-num{font-size:18px;font-weight:700;color:#fff}
.stat-num.g{color:#5DCAA5}.stat-num.r{color:#F0997B}.stat-num.b{color:#85B7EB}
.stat-label{font-size:10px;color:#9ca3af;margin-top:1px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;z-index:50;max-width:500px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;border:none;background:none;gap:3px;-webkit-tap-highlight-color:transparent}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;color:#9ca3af;font-weight:500}
.nav-item.active .nav-label{color:#1D9E75}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
.btn-xs{font-size:12px;padding:4px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;cursor:pointer}
.btn-xs:hover{background:#f5f5f5}
.btn-xs.green{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-primary:hover{background:#0F6E56}
.btn-secondary{width:100%;padding:9px;background:#fff;color:#111;border:1px solid #d1d5db;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px}
.btn-danger{width:100%;padding:8px;background:#fff;color:#b03030;border:1px solid #f09090;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px}
.btn-upgrade{width:100%;padding:11px;background:#1a1a2e;color:#5DCAA5;border:1.5px solid #5DCAA5;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;text-align:center}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.sc.clickable{cursor:pointer}.sc.clickable:hover{border-color:#aaa}
.sc.present-card{border-left:3px solid #1D9E75}
.sc.absent-card{border-left:3px solid #D85A30}
.sc.justif-card{border-left:3px solid #378ADD}
.sc.alert-card{border-left:3px solid #D85A30}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av0{background:#dbeafe;color:#1e40af}.av1{background:#dcfce7;color:#166534}
.av2{background:#fef9c3;color:#854d0e}.av3{background:#ffe4e6;color:#9f1239}.av4{background:#ede9fe;color:#5b21b6}
.si{flex:1;min-width:0}
.sn{font-size:13px;font-weight:600;color:#111}
.sm{font-size:11px;color:#888;margin-top:2px;display:flex;align-items:center;gap:5px}
.fb{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.fb.ok{background:#dcfce7;color:#166534}.fb.warn{background:#fef9c3;color:#854d0e}.fb.bad{background:#ffe4e6;color:#9f1239}
.fb.blue{background:#e6f1fb;color:#185fa5}
.chk{width:36px;height:36px;border-radius:50%;border:1.5px solid #d1d5db;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:#aaa;transition:all .15s;font-weight:700}
.chk.present{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chk.absent{background:#D85A30;border-color:#D85A30;color:#fff}
.chk.justif{background:#378ADD;border-color:#378ADD;color:#fff}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:9px 11px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111}
.fi:focus{outline:none;border-color:#1D9E75}
textarea.fi{resize:vertical;min-height:70px;font-family:inherit}
.ni{width:64px;padding:6px 8px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;color:#111}
.cls{background:#fff;border:none;font-size:22px;cursor:pointer;color:#888;padding:2px 6px;line-height:1}
.alert-banner{background:#fff3cd;border:1px solid #f0c040;border-radius:8px;padding:9px 13px;margin-bottom:10px;font-size:12px;color:#856404}
.err{color:#b03030;font-size:12px;margin-top:6px;text-align:center;font-weight:600}
.hist-item{padding:9px 0;border-bottom:1px solid #eee}
.progress-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px}
.rel-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:12px;color:#333}
.rel-row:last-child{border:none}
.link-box{background:#f5f5f5;border:1px dashed #ccc;border-radius:8px;padding:8px 11px;font-size:11px;color:#666;word-break:break-all;margin-top:5px;cursor:pointer}
.link-box:hover{border-color:#888}
.empty-state{text-align:center;padding:28px 16px;color:#999;font-size:13px}
.beta-box{margin-top:14px;padding:12px;background:#f0faf6;border-radius:10px;border:1.5px dashed #1D9E75}
.beta-title{font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.beta-btn{width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.beta-btn:last-child{margin-bottom:0}
.beta-btn:hover{background:#f5f5f5}
.beta-hint{font-size:11px;color:#999}
.turma-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.turma-card:hover{border-color:#1D9E75}
.turma-card-nome{font-size:14px;font-weight:700;color:#111}
.turma-card-info{font-size:12px;color:#888;margin-top:3px}
.profile-av{width:64px;height:64px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#5DCAA5;margin:0 auto 12px}

/* ── Boletim ── */
.boletim-lock{background:#f8f8f8;border:1.5px dashed #d1d5db;border-radius:12px;padding:24px 16px;text-align:center;margin-bottom:10px}
.boletim-lock-icon{font-size:32px;margin-bottom:8px}
.boletim-lock-title{font-size:15px;font-weight:700;color:#111;margin-bottom:6px}
.boletim-lock-sub{font-size:12px;color:#888;margin-bottom:14px}
.sem-tabs{display:flex;gap:6px;margin-bottom:12px}
.sem-tab{flex:1;padding:8px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;cursor:pointer;text-align:center;font-weight:500;color:#666}
.sem-tab.active{background:#1a1a2e;color:#5DCAA5;border-color:#1a1a2e;font-weight:700}
.nota-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.nota-row:last-child{border:none}
.nota-materia{flex:1;font-size:13px;font-weight:600;color:#111}
.nota-input{width:60px;padding:5px 8px;font-size:14px;border:1px solid #d1d5db;border-radius:8px;text-align:center;font-weight:700}
.nota-input:focus{outline:none;border-color:#1D9E75}
.nota-badge{width:44px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.nota-badge.ap{background:#dcfce7;color:#166534}
.nota-badge.rc{background:#fef9c3;color:#854d0e}
.nota-badge.rp{background:#ffe4e6;color:#9f1239}
.nota-badge.nd{background:#f5f5f5;color:#aaa}
.media-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-top:4px;border-top:2px solid #f0f0f0}
.boletim-aluno-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.boletim-aluno-nome{font-size:13px;font-weight:700;color:#111;margin-bottom:6px}
.boletim-mini{display:flex;gap:5px;flex-wrap:wrap}
.materia-chip{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.upgrade-banner{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
const storage={
  async get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  async set(k,v){try{localStorage.setItem(k,v);return{value:v};}catch{return null;}},
};
window.storage=storage;
const DATA_KEY='chamada_data_v6';
const ADM_KEY='chamada_adm_v6';

function uid(){return Math.random().toString(36).slice(2,9)}
function initials(n){return(n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function nowStr(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function today(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0}return h.toString(36)}
function fc(f,lim){if(f===0)return'ok';if(f>=lim)return'bad';if(f>=lim-2)return'warn';return'ok'}
function getParam(k){try{return new URLSearchParams(window.location.search).get(k)}catch{return null}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// PLANO: limites — integrar gateway no backend
const PLANOS={
  beta:   {nome:'Beta',  maxTurmas:99,boletim:true},
  basico: {nome:'Básico',maxTurmas:1, boletim:false},
  plus:   {nome:'Plus',  maxTurmas:3, boletim:true},
  prime:  {nome:'Prime', maxTurmas:99,boletim:true},
};

function notaBadge(n){
  if(n===null||n===undefined||n==='')return{cls:'nd',txt:'—'};
  const v=parseFloat(n);
  if(isNaN(v))return{cls:'nd',txt:'—'};
  if(v>=7)return{cls:'ap',txt:v.toFixed(1)};
  if(v>=5)return{cls:'rc',txt:v.toFixed(1)};
  return{cls:'rp',txt:v.toFixed(1)};
}
function calcMedia(notas){
  const vals=Object.values(notas||{}).filter(v=>v!==''&&v!==null&&v!==undefined&&!isNaN(parseFloat(v)));
  if(!vals.length)return null;
  return vals.reduce((s,v)=>s+parseFloat(v),0)/vals.length;
}

let S={
  screen:'loading',authRole:null,authProfId:null,
  turmaAtiva:null,tab:'chamada',modal:null,loginErr:'',
  admPassHash:hash('admin123'),turmas:{},professores:{},
  editBuf:{},profBuffer:{},
  _semestre:1,_histSearch:'',_boletimAluno:null,
  // Histórico navegação: turma → aluno
  _histTurma:null,_histAluno:null
};

async function loadData(){
  try{
    const [r1,r2]=await Promise.all([storage.get(DATA_KEY),storage.get(ADM_KEY)]);
    if(r1?.value){const d=JSON.parse(r1.value);S.turmas=d.turmas||{};S.professores=d.professores||{};}
    if(r2?.value){S.admPassHash=r2.value;}
  }catch(e){}
  const tid=getParam('turma');
  const sess=localStorage.getItem('auth_v6');
  if(sess){
    const p=JSON.parse(sess);S.authRole=p.role;S.authProfId=p.profId;
    if(tid&&S.turmas[tid])S.turmaAtiva=tid;
    else if(p.role==='prof'){const pr=S.professores[p.profId];S.turmaAtiva=pr?.turmaId||null;}
    S.screen=(p.role==='adm')?'adm':'app';
    if(p.role==='prof'){
      const mt=getMeusTurmas();
      if(mt.length===1)S.turmaAtiva=mt[0].id;
      else if(mt.length>1&&!S.turmaAtiva)S.turmaAtiva=null;
    }
  }else{
    if(tid&&S.turmas[tid])S.turmaAtiva=tid;
    S.screen='login';
  }
  render();
}
async function save(){
  await storage.set(DATA_KEY,JSON.stringify({turmas:S.turmas,professores:S.professores}));
  await storage.set(ADM_KEY,S.admPassHash);
}
function setSession(role,profId=null){S.authRole=role;S.authProfId=profId;localStorage.setItem('auth_v6',JSON.stringify({role,profId}));}
function logout(){S.authRole=null;S.authProfId=null;S.turmaAtiva=null;S.screen='login';localStorage.removeItem('auth_v6');render();}

function tryLogin(user,pass){
  S.loginErr='';
  if(!user||!pass){S.loginErr='Preencha usuário e senha.';render();return;}
  if(user.toLowerCase()==='adm'||user.toLowerCase()==='admin'){
    if(hash(pass)===S.admPassHash){setSession('adm');S.screen='adm';S.tab='relatorio';render();return;}
    S.loginErr='Senha de administrador incorreta.';render();return;
  }
  const prof=Object.values(S.professores).find(p=>p.email.toLowerCase()===user.toLowerCase());
  if(!prof){S.loginErr='Usuário não encontrado.';render();return;}
  if(prof.status==='pendente'){S.loginErr='Cadastro aguardando aprovação do ADM.';render();return;}
  if(hash(pass)!==prof.passHash){S.loginErr='Senha incorreta.';render();return;}
  setSession('prof',prof.id);S.screen='app';S.tab='chamada';
  const mt=getMeusTurmasPara(prof.id);
  S.turmaAtiva=(mt.length===1)?mt[0].id:null;
  render();
}
function tryRegister(){
  const{nome,email,senha,senha2}=S.profBuffer;
  if(!nome?.trim()||!email?.trim()||!senha?.trim()){S.loginErr='Preencha todos os campos.';render();return;}
  if(senha!==senha2){S.loginErr='As senhas não coincidem.';render();return;}
  if(senha.length<4){S.loginErr='Senha deve ter ao menos 4 caracteres.';render();return;}
  if(Object.values(S.professores).find(p=>p.email.toLowerCase()===email.toLowerCase())){S.loginErr='E-mail já cadastrado.';render();return;}
  const id=uid();
  S.professores[id]={id,nome:nome.trim(),email:email.trim(),passHash:hash(senha),turmaId:null,status:'pendente',plano:'basico',escola:S.profBuffer.escola?.trim()||''};
  save();S.loginErr='';S.screen='login';showToast('Cadastro enviado! Aguarde aprovação.');render();
}
function entrarDemo(tipo){
  if(tipo==='adm'){tryLogin('adm','admin123');return;}
  const EMAIL='professor@demo.com';
  let prof=Object.values(S.professores).find(p=>p.email===EMAIL);
  if(!prof){
    const pid=uid();const tid=uid();const tid2=uid();
    // Matérias demo
    const mats=['Matemática','Português','Ciências','História','Geografia'];
    S.turmas[tid]={id:tid,nome:'9º Ano A',escola:'Escola Demo',profId:pid,limiteFaltas:6,
      materias:mats,
      alunos:[
        {id:uid(),nome:'Ana Beatriz Costa',obs:'Muito participativa.',faltas:2,presente:null,cor:0,
          notas:{s1:{'Matemática':8.5,'Português':9.0,'Ciências':7.5,'História':8.0,'Geografia':9.5},s2:{}}},
        {id:uid(),nome:'Bruno Lima Santos',obs:'Dificuldades em álgebra.',faltas:5,presente:null,cor:1,
          notas:{s1:{'Matemática':4.5,'Português':6.0,'Ciências':5.5,'História':6.5,'Geografia':5.0},s2:{}}},
        {id:uid(),nome:'Carla Ferreira',obs:'Faltou nas últimas semanas.',faltas:7,presente:null,cor:2,
          notas:{s1:{'Matemática':7.0,'Português':7.5,'Ciências':8.0,'História':6.0,'Geografia':7.0},s2:{}}},
        {id:uid(),nome:'Diego Souza',obs:'Transferido recentemente.',faltas:1,presente:null,cor:3,
          notas:{s1:{},s2:{}}},
        {id:uid(),nome:'Eduarda Mendes',obs:'TDAH. Sentar na frente.',faltas:0,presente:null,cor:4,
          notas:{s1:{'Matemática':9.5,'Português':9.0,'Ciências':9.5,'História':10,'Geografia':8.5},s2:{}}},
      ],history:[],criada:nowStr()};
    S.turmas[tid2]={id:tid2,nome:'8º Ano B',escola:'Escola Demo',profId:pid,limiteFaltas:6,
      materias:['Matemática','Português','Educação Física'],
      alunos:[
        {id:uid(),nome:'Felipe Rocha',obs:'',faltas:1,presente:null,cor:0,notas:{s1:{},s2:{}}},
        {id:uid(),nome:'Gabriela Nunes',obs:'',faltas:0,presente:null,cor:1,notas:{s1:{},s2:{}}},
      ],history:[],criada:nowStr()};
    S.professores[pid]={id:pid,nome:'Prof. João Silva',email:EMAIL,passHash:hash('demo123'),turmaId:tid,status:'ativo',plano:'plus',escola:'Escola Demo'};
    prof=S.professores[pid];save();
  }
  tryLogin(EMAIL,'demo123');
}

function getProf(){return S.professores[S.authProfId]||null}
function getMeusTurmas(){return getMeusTurmasPara(S.authProfId)}
function getMeusTurmasPara(pid){return Object.values(S.turmas).filter(t=>t.profId===pid)}
function getTurmaAtiva(){return S.turmaAtiva?S.turmas[S.turmaAtiva]||null:null}
function getPlano(){const p=getProf();return PLANOS[p?.plano||'basico']}
function temBoletim(){return getPlano()?.boletim===true}

// ── Chamada ──
// BACKEND: registrar chamada no banco de dados com timestamp do servidor
function todosPresentes(tid){
  const t=S.turmas[tid];if(!t)return;
  // Se todos já estão presentes, limpa. Senão, marca todos.
  const todosJaMarcados=t.alunos.every(a=>a.presente==='P');
  t.alunos=t.alunos.map(a=>({...a,presente:todosJaMarcados?null:'P'}));
  save();render();
  showToast(todosJaMarcados?'Seleção limpa!':'Todos marcados como presentes!');
}
function togglePresente(aid){
  const t=getTurmaAtiva();if(!t)return;
  t.alunos=t.alunos.map(a=>{
    if(a.id!==aid)return a;
    const old=a.presente;
    let np=old===null?'P':old==='P'?'F':old==='F'?'J':null;
    let nf=a.faltas;
    if(old==='P'&&np==='F')nf++;
    if(old==='F'&&np==='J')nf=Math.max(0,nf-1);
    return{...a,presente:np,faltas:nf};
  });
  save();render();
}
function salvarChamada(){
  const t=getTurmaAtiva();if(!t)return;
  const presentes=t.alunos.filter(a=>a.presente==='P');
  const ausentes=t.alunos.filter(a=>a.presente==='F');
  const justific=t.alunos.filter(a=>a.presente==='J');
  if(!presentes.length&&!ausentes.length&&!justific.length){showToast('Marque ao menos um aluno.');return;}
  t.history.unshift({id:uid(),data:nowStr(),presentes:presentes.map(a=>a.nome),ausentes:ausentes.map(a=>a.nome),justificados:justific.map(a=>a.nome),total:t.alunos.length});
  if(t.history.length>60)t.history=t.history.slice(0,60);
  t.alunos=t.alunos.map(a=>({...a,presente:null}));
  save();render();showToast('✓ Chamada salva!');
}

// ── Alunos ──
function salvarAluno(){
  const{nome,obs,turmaId,faltas}=S.editBuf;
  if(!nome?.trim()){showToast('Digite o nome do aluno.');return;}
  if(S.modal?.type==='novoAluno'){
    const tid=turmaId||S.turmaAtiva;
    if(!tid||!S.turmas[tid]){showToast('Selecione uma turma.');return;}

// BACKEND: gerar PDF no servidor para melhor compatibilidade
function gerarRelatorioAluno(aid,tid){
  const ht=S.turmas[tid];
  const aluno=ht?.alunos.find(a=>a.id===aid);
  if(!ht||!aluno)return;
  const prof=getProf();
  const lmt=ht.limiteFaltas||6;
  const totalCham=ht.history.length;
  const presencas=ht.history.filter(h=>h.presentes.includes(aluno.nome)).length;
  const freq=totalCham>0?Math.round(presencas/totalCham*100):null;
  const m1=calcMedia(aluno.notas?.s1);
  const m2=calcMedia(aluno.notas?.s2);
  const mediaAnual=(m1!==null&&m2!==null)?(m1+m2)/2:(m1!==null?m1:m2);

  // Monta linhas de notas
  let notasHTML='';
  if((ht.materias||[]).length){
    notasHTML=`<h3 style="margin:16px 0 8px;font-size:13px;color:#555;text-transform:uppercase;letter-spacing:.05em">Boletim de Notas</h3><table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="background:#f0f0f0"><th style="padding:5px 8px;text-align:left">Matéria</th><th style="padding:5px 8px;text-align:center">1º Sem.</th><th style="padding:5px 8px;text-align:center">2º Sem.</th><th style="padding:5px 8px;text-align:center">Média</th></tr>`;
    ht.materias.forEach(mat=>{
      const n1=aluno.notas?.s1?.[mat];const n2=aluno.notas?.s2?.[mat];
      const med=(n1!==undefined&&n1!==''&&n2!==undefined&&n2!=='')?((parseFloat(n1)+parseFloat(n2))/2).toFixed(1):'—';
      notasHTML+=`<tr style="border-bottom:1px solid #eee"><td style="padding:5px 8px">${mat}</td><td style="padding:5px 8px;text-align:center">${n1!==undefined&&n1!==''?n1:'—'}</td><td style="padding:5px 8px;text-align:center">${n2!==undefined&&n2!==''?n2:'—'}</td><td style="padding:5px 8px;text-align:center;font-weight:700">${med}</td></tr>`;
    });
    notasHTML+=`</table>`;
  }

  // Chamadas do aluno
  const chamAlu=ht.history.filter(h=>[...h.presentes,...(h.ausentes||[]),...(h.justificados||[])].includes(aluno.nome));
  let chamHTML=chamAlu.slice(0,20).map(h=>{
    const st=h.presentes.includes(aluno.nome)?'Presente':(h.justificados||[]).includes(aluno.nome)?'Justificado':'Ausente';
    return `<tr style="border-bottom:1px solid #eee"><td style="padding:4px 8px;font-size:11px">${h.data}</td><td style="padding:4px 8px;font-size:11px;font-weight:600;color:${st==='Presente'?'#166534':st==='Justificado'?'#185fa5':'#b03030'}">${st}</td></tr>`;
  }).join('');

  const win=window.open('','_blank');
  if(!win)return;
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio - ${aluno.nome}</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;max-width:600px;margin:0 auto;color:#111}
  h1{font-size:18px;margin-bottom:4px}h2{font-size:13px;color:#888;font-weight:400;margin-bottom:16px}
  .chip{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;margin:2px}
  .ok{background:#dcfce7;color:#166534}.bad{background:#ffe4e6;color:#9f1239}.blue{background:#e6f1fb;color:#185fa5}
  @media print{button{display:none}}</style></head><body>
  <div style="border-bottom:2px solid #1D9E75;padding-bottom:12px;margin-bottom:16px">
    <div style="font-size:11px;color:#888;margin-bottom:4px">CHAMADA FÁCIL — RELATÓRIO DO ALUNO</div>
    <h1>${aluno.nome}</h1>
    <h2>${esc(ht.nome)} · ${esc(ht.escola||'')} · ${prof?esc(prof.nome):''}</h2>
    <div>
      <span class="chip ${freq!==null&&freq>=75?'ok':'bad'}">${freq!==null?freq+'% frequência':'—'}</span>
      <span class="chip ${fc(aluno.faltas,lmt)==='bad'?'bad':'ok'}">${aluno.faltas} falta${aluno.faltas!==1?'s':''}</span>
      ${mediaAnual!==null?`<span class="chip ${mediaAnual>=7?'ok':mediaAnual>=5?'':'bad'}">${mediaAnual.toFixed(1)} média anual</span>`:''}
    </div>
  </div>
  ${aluno.obs?`<div style="background:#f8f8f8;border-radius:6px;padding:10px;margin-bottom:16px;font-size:12px"><strong>Observações:</strong> ${esc(aluno.obs)}</div>`:''}
  ${notasHTML}
  ${chamHTML?`<h3 style="margin:16px 0 8px;font-size:13px;color:#555;text-transform:uppercase;letter-spacing:.05em">Histórico de Chamadas</h3><table style="width:100%;border-collapse:collapse">${chamHTML}</table>`:''}
  <div style="margin-top:24px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:8px">
    Gerado em ${nowStr()} · Chamada Fácil · ${prof?esc(prof.nome):''}
  </div>
  <button onclick="window.print()" style="margin-top:16px;padding:8px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">🖨 Imprimir / Salvar PDF</button>
  </body></html>`);
  win.document.close();
}

function compartilharAluno(aid,tid){
  const ht=S.turmas[tid];
  const aluno=ht?.alunos.find(a=>a.id===aid);
  if(!ht||!aluno)return;
  const prof=getProf();
  const hora=new Date().getHours();
  const saud=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
  const lmt=ht.limiteFaltas||6;
  const totalCham=ht.history.length;
  const presencas=ht.history.filter(h=>h.presentes.includes(aluno.nome)).length;
  const freq=totalCham>0?Math.round(presencas/totalCham*100):null;
  const m1=calcMedia(aluno.notas?.s1);
  const m2=calcMedia(aluno.notas?.s2);
  const mediaAnual=(m1!==null&&m2!==null)?(m1+m2)/2:(m1!==null?m1:m2);

  let msg=`${saud}! 👋\n\nAqui é *${prof?prof.nome:'o(a) professor(a)'}* da turma *${ht.nome}*${ht.escola?' — '+ht.escola:''}.\n\nGostaria de compartilhar algumas informações sobre *${aluno.nome}*:\n\n`;
  msg+=`📊 *Frequência:* ${freq!==null?freq+'%':'Não disponível'}\n`;
  msg+=`📌 *Faltas registradas:* ${aluno.faltas}${aluno.faltas>=lmt?' ⚠️ Atenção: limite atingido':''}\n`;
  if(mediaAnual!==null)msg+=`📝 *Média anual:* ${mediaAnual.toFixed(1)}${mediaAnual>=7?' ✅':mediaAnual>=5?' ⚠️':' ❌'}\n`;
  if(aluno.obs)msg+=`\n💬 *Observações:* ${aluno.obs}\n`;
  msg+=`\nQuaisquer dúvidas, estou à disposição. 😊`;

  const url='https://wa.me/?text='+encodeURIComponent(msg);
  try{window.open(url,'_blank');}catch(e){
    navigator.clipboard?.writeText(msg);showToast('Mensagem copiada! Cole no WhatsApp.');
  }
}

      mbg.onclick=e=>{if(e.target===mbg)closeModal();};
      const mdl=document.createElement('div');mdl.className='modal';mdl.onclick=e=>e.stopPropagation();
      mdl.innerHTML=mc;mbg.appendChild(mdl);document.body.appendChild(mbg);
    }
  }
}

loadData();
</script>
</body>
</html>
