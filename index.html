<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamada Fácil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f3f4f6;min-height:100vh}
.app{max-width:500px;margin:0 auto;padding:12px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px 18px;margin-bottom:10px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.page-title{font-size:17px;font-weight:700;color:#111}
.sub-info{font-size:12px;color:#888;margin-top:2px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:#f5f5f5;border-radius:8px;padding:9px 10px;text-align:center}
.stat-num{font-size:19px;font-weight:700;color:#111}
.stat-num.g{color:#0a7a4e}.stat-num.r{color:#b03030}
.stat-label{font-size:11px;color:#888;margin-top:1px}
.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:6px 13px;border-radius:8px;font-size:13px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.tab.active{background:#f0f0f0;color:#111;font-weight:700}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em}
.btn-xs{font-size:12px;padding:4px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111;cursor:pointer}
.btn-xs:hover{background:#f5f5f5}
.btn-primary{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-primary:hover{background:#0F6E56}
.btn-secondary{width:100%;padding:9px;background:#fff;color:#111;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px}
.btn-secondary:hover{background:#f5f5f5}
.btn-danger{width:100%;padding:8px;background:#fff;color:#b03030;border:1px solid #f09090;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px}
.btn-wpp{width:100%;padding:11px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-wpp:hover{background:#1da851}
.btn-pdf{width:100%;padding:11px;background:#e53e3e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-pdf:hover{background:#c53030}
.sc{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;transition:border-color .15s}
.sc.clickable{cursor:pointer}.sc.clickable:hover{border-color:#aaa}
.sc.present-card{border-left:3px solid #1D9E75}
.sc.absent-card{border-left:3px solid #D85A30}
.sc.alert-card{border-left:3px solid #D85A30}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av0{background:#dbeafe;color:#1e40af}.av1{background:#dcfce7;color:#166534}
.av2{background:#fef9c3;color:#854d0e}.av3{background:#ffe4e6;color:#9f1239}.av4{background:#ede9fe;color:#5b21b6}
.si{flex:1;min-width:0}
.sn{font-size:13px;font-weight:600;color:#111}
.sm{font-size:11px;color:#888;margin-top:2px;display:flex;align-items:center;gap:6px}
.fb{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.fb.ok{background:#dcfce7;color:#166534}.fb.warn{background:#fef9c3;color:#854d0e}.fb.bad{background:#ffe4e6;color:#9f1239}
.chk{width:36px;height:36px;border-radius:50%;border:1.5px solid #ccc;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#aaa;transition:all .15s;font-weight:700}
.chk.present{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chk.absent{background:#D85A30;border-color:#D85A30;color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:12px 12px 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;color:#111}
.cls{background:#fff;border:none;font-size:22px;cursor:pointer;color:#888;padding:2px 6px;line-height:1}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:600}
.fi{width:100%;padding:9px 11px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111}
.fi:focus{outline:none;border-color:#1D9E75}
textarea.fi{resize:vertical;min-height:70px;font-family:sans-serif}
.ni{width:64px;padding:6px 8px;font-size:13px;border:1px solid #ccc;border-radius:8px;text-align:center}
.alert-banner{background:#fff3cd;border:1px solid #f0c040;border-radius:8px;padding:9px 13px;margin-bottom:10px;font-size:12px;color:#856404}
.err{color:#b03030;font-size:12px;margin-top:6px;text-align:center;font-weight:600}
.hist-item{padding:9px 0;border-bottom:1px solid #eee}
.progress-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px}
.rel-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:12px;color:#333}
.rel-row:last-child{border:none}
.link-box{background:#f5f5f5;border:1px dashed #ccc;border-radius:8px;padding:8px 11px;font-size:11px;color:#666;word-break:break-all;margin-top:5px;cursor:pointer}
.link-box:hover{border-color:#888}
.empty-state{text-align:center;padding:28px 16px;color:#999;font-size:13px}
.divider{border:none;border-top:1px solid #eee;margin:10px 0}
.beta-box{margin-top:16px;padding:12px;background:#f0faf6;border-radius:8px;border:1.5px dashed #1D9E75}
.beta-title{font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.beta-btn{width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.beta-btn:last-child{margin-bottom:0}
.beta-btn:hover{background:#f5f5f5}
.beta-hint{font-size:11px;color:#999}
.timeline{padding:4px 0}
.tl-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.tl-item:last-child{border:none}
.tl-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.tl-present{background:#dcfce7}.tl-absent{background:#ffe4e6}.tl-obs{background:#fef9c3}
.tl-body{flex:1}
.tl-date{font-size:11px;color:#999;margin-bottom:2px}
.tl-text{font-size:13px;color:#111}
.obs-input-row{display:flex;gap:8px;margin-top:10px}
.obs-input-row input{flex:1;padding:8px 11px;font-size:13px;border:1px solid #ccc;border-radius:8px}
.obs-input-row button{padding:8px 14px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:700}
.perfil-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.perfil-stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center}
.perfil-stat-n{font-size:18px;font-weight:700;color:#111}
.perfil-stat-l{font-size:10px;color:#888;margin-top:1px}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const DATA_KEY='chamada_v5';const ADM_KEY='chamada_adm_v5';
const storage={
  async get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null}catch{return null}},
  async set(k,v){try{localStorage.setItem(k,v);return{value:v}}catch{return null}}
};
function uid(){return Math.random().toString(36).slice(2,9)}
function initials(n){return(n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function nowStr(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function today(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0}return h.toString(36)}
function fc(f,lim){if(f===0)return'ok';if(f>=lim)return'bad';if(f>=lim-2)return'warn';return'ok'}
function getParam(k){try{return new URLSearchParams(window.location.search).get(k)}catch{return null}}
function saudacao(){const h=new Date().getHours();if(h>=5&&h<12)return'Bom dia';if(h>=12&&h<18)return'Boa tarde';return'Boa noite';}

let S={screen:'loading',authRole:null,authProfId:null,turmaAtiva:null,tab:'chamada',modal:null,loginErr:'',admPassHash:hash('admin123'),turmas:{},professores:{},editBuf:{},profBuffer:{}};

async function loadData(){
  try{const[r1,r2]=await Promise.all([storage.get(DATA_KEY),storage.get(ADM_KEY)]);
    if(r1?.value){const d=JSON.parse(r1.value);S.turmas=d.turmas||{};S.professores=d.professores||{};}
    if(r2?.value){S.admPassHash=r2.value;}
  }catch(e){}
  const tid=getParam('turma');
  const sess=sessionStorage.getItem('auth_v5');
  if(sess){const p=JSON.parse(sess);S.authRole=p.role;S.authProfId=p.profId;
    if(tid&&S.turmas[tid])S.turmaAtiva=tid;
    else if(p.role==='prof'){const pr=S.professores[p.profId];S.turmaAtiva=pr?.turmaId||null;}
    S.screen=p.role==='adm'?'relatorio':'chamada';
  }else{if(tid&&S.turmas[tid])S.turmaAtiva=tid;S.screen='login';}
  render();
}
async function save(){await storage.set(DATA_KEY,JSON.stringify({turmas:S.turmas,professores:S.professores}));await storage.set(ADM_KEY,S.admPassHash);}
function setSession(r,p=null){S.authRole=r;S.authProfId=p;sessionStorage.setItem('auth_v5',JSON.stringify({role:r,profId:p}));}
function logout(){S.authRole=null;S.authProfId=null;S.turmaAtiva=null;S.screen='login';sessionStorage.removeItem('auth_v5');render();}

function tryLogin(user,pass){
  S.loginErr='';
  if(!user||!pass){S.loginErr='Preencha usuário e senha.';render();return;}
  if(user.toLowerCase()==='adm'||user.toLowerCase()==='admin'){
    if(hash(pass)===S.admPassHash){setSession('adm');S.screen='relatorio';S.tab='relatorio';render();return;}
    S.loginErr='Senha incorreta.';render();return;
  }
  const prof=Object.values(S.professores).find(p=>p.email.toLowerCase()===user.toLowerCase());
  if(!prof){S.loginErr='Usuário não encontrado.';render();return;}
  if(prof.status==='pendente'){S.loginErr='Aguardando aprovação do ADM.';render();return;}
  if(hash(pass)!==prof.passHash){S.loginErr='Senha incorreta.';render();return;}
  setSession('prof',prof.id);S.turmaAtiva=prof.turmaId||null;S.screen='chamada';S.tab='chamada';render();
}
function tryRegister(){
  const{nome,email,senha,senha2,turmaId}=S.profBuffer;
  if(!nome?.trim()||!email?.trim()||!senha?.trim()){S.loginErr='Preencha todos os campos.';render();return;}
  if(senha!==senha2){S.loginErr='As senhas não coincidem.';render();return;}
  if(senha.length<4){S.loginErr='Mínimo 4 caracteres.';render();return;}
  if(Object.values(S.professores).find(p=>p.email.toLowerCase()===email.toLowerCase())){S.loginErr='E-mail já cadastrado.';render();return;}
  const id=uid();
  S.professores[id]={id,nome:nome.trim(),email:email.trim(),passHash:hash(senha),turmaId:turmaId||S.turmaAtiva||null,status:'pendente'};
  save();S.loginErr='';S.screen='login';showToast('Cadastro enviado!');render();
}
function entrarDemo(tipo){
  if(tipo==='adm'){tryLogin('adm','admin123');return;}
  const EMAIL='professor@demo.com';
  let prof=Object.values(S.professores).find(p=>p.email===EMAIL);
  if(!prof){
    const pid=uid();const tid=uid();
    S.turmas[tid]={id:tid,nome:'9º Ano A — Matemática',profId:pid,limiteFaltas:6,alunos:[
      {id:uid(),nome:'Ana Beatriz Costa',obs:'Muito participativa. Destaque na turma.',faltas:2,presente:null,cor:0,historico:[]},
      {id:uid(),nome:'Bruno Lima Santos',obs:'Dificuldades em álgebra. Acompanhar de perto.',faltas:5,presente:null,cor:1,historico:[]},
      {id:uid(),nome:'Carla Ferreira',obs:'Faltou nas últimas semanas. Verificar situação.',faltas:7,presente:null,cor:2,historico:[]},
      {id:uid(),nome:'Diego Souza',obs:'Transferido recentemente. Adaptando bem.',faltas:1,presente:null,cor:3,historico:[]},
      {id:uid(),nome:'Eduarda Mendes',obs:'TDAH diagnosticado. Sentar na frente.',faltas:0,presente:null,cor:4,historico:[]},
    ],history:[],criada:nowStr()};
    S.professores[pid]={id:pid,nome:'Prof. João Silva',email:EMAIL,passHash:hash('demo123'),turmaId:tid,status:'ativo'};
    prof=S.professores[pid];save();
  }
  tryLogin(EMAIL,'demo123');
}
function getProf(){return S.professores[S.authProfId]||null}
function getTurma(){
  if(S.authRole==='adm')return S.turmaAtiva?S.turmas[S.turmaAtiva]:null;
  const p=getProf();return p?.turmaId?S.turmas[p.turmaId]:null;
}
function togglePresente(aid){
  const t=getTurma();if(!t)return;
  t.alunos=t.alunos.map(a=>{
    if(a.id!==aid)return a;
    const old=a.presente;let np=old===null?true:old===true?false:null;let nf=a.faltas;
    if(old===true&&np===false)nf++;if(old===false&&np===null)nf=Math.max(0,nf-1);
    return{...a,presente:np,faltas:nf};
  });save();render();
}
function salvarChamada(){
  const t=getTurma();if(!t)return;
  const presentes=t.alunos.filter(a=>a.presente===true);
  const ausentes=t.alunos.filter(a=>a.presente===false);
  if(!presentes.length&&!ausentes.length){showToast('Marque ao menos um aluno.');return;}
  const dataAtual=nowStr();
  t.history.unshift({id:uid(),data:dataAtual,presentes:presentes.map(a=>a.nome),ausentes:ausentes.map(a=>a.nome),total:t.alunos.length});
  if(t.history.length>60)t.history=t.history.slice(0,60);
  t.alunos=t.alunos.map(a=>{
    if(a.presente===null)return a;
    const entrada={tipo:a.presente===true?'presente':'ausente',data:dataAtual};
    return{...a,presente:null,historico:[entrada,...(a.historico||[])].slice(0,100)};
  });
  save();render();showToast('Chamada salva!');
}
function adicionarObservacao(aid,texto){
  if(!texto?.trim())return;
  const t=getTurma();if(!t)return;
  t.alunos=t.alunos.map(a=>{
    if(a.id!==aid)return a;
    return{...a,historico:[{tipo:'obs',data:nowStr(),texto:texto.trim()},...(a.historico||[])].slice(0,100)};
  });
  save();render();showToast('Observação salva!');
}
function salvarAluno(){
  const{nome,obs,turmaId,faltas}=S.editBuf;
  if(!nome?.trim()){showToast('Digite o nome.');return;}
  if(S.modal?.type==='novoAluno'){
    const tid=S.authRole==='adm'?turmaId:getTurma()?.id;
    if(!tid){showToast('Selecione uma turma.');return;}
    S.turmas[tid].alunos.push({id:uid(),nome:nome.trim(),obs:obs?.trim()||'',faltas:0,presente:null,cor:S.turmas[tid].alunos.length%5,historico:[]});
  }else{
    const t=getTurma();if(!t)return;
    t.alunos=t.alunos.map(a=>a.id===S.modal.aid?{...a,nome:nome.trim(),obs:obs?.trim()||'',faltas:parseInt(faltas)||a.faltas}:a);
  }
  save();closeModal();showToast('Salvo!');
}
function removerAluno(){if(!confirm('Remover?'))return;const t=getTurma();if(!t)return;t.alunos=t.alunos.filter(a=>a.id!==S.modal.aid);save();closeModal();}
function criarTurma(){
  const{nome,profId,lim}=S.editBuf;if(!nome?.trim()){showToast('Digite o nome.');return;}
  const id=uid();S.turmas[id]={id,nome:nome.trim(),profId:profId||null,limiteFaltas:parseInt(lim)||6,alunos:[],history:[],criada:nowStr()};
  if(profId&&S.professores[profId]){S.professores[profId].turmaId=id;S.professores[profId].status='ativo';}
  save();closeModal();showToast('Turma criada!');
}
function aprovarProf(pid){
  const p=S.professores[pid];p.status='ativo';
  if(!p.turmaId){const tid=uid();S.turmas[tid]={id:tid,nome:'Turma de '+p.nome.split(' ')[0],profId:pid,limiteFaltas:6,alunos:[],history:[],criada:nowStr()};p.turmaId=tid;}
  save();render();showToast('Aprovado!');
}
function rejeitarProf(pid){if(confirm('Rejeitar?')){delete S.professores[pid];save();render();}}
function resetarSenha(pid){const p=S.professores[pid];const nova=Math.random().toString(36).slice(2,8);p.passHash=hash(nova);save();S.modal={type:'senhaReset',nome:p.nome,senha:nova};render();}
function trocarSenhaAdm(){
  const p1=document.getElementById('np1')?.value;const p2=document.getElementById('np2')?.value;
  if(!p1||p1.length<4){showToast('Senha curta.');return;}if(p1!==p2){showToast('Não coincidem.');return;}
  S.admPassHash=hash(p1);save();showToast('Senha alterada!');
}
function atribuirProfTurma(turmaId,profId){
  if(turmaId&&S.turmas[turmaId])S.turmas[turmaId].profId=profId||null;
  if(profId&&S.professores[profId])S.professores[profId].turmaId=turmaId||null;
  save();
}
function getLinkTurma(id){return window.location.href.split('?')[0]+'?turma='+id}
function copyLink(id){try{navigator.clipboard.writeText(getLinkTurma(id));showToast('Link copiado!');}catch(e){}}
function closeModal(){S.modal=null;render();}
function openEditAluno(aid){const a=getTurma()?.alunos.find(x=>x.id===aid);if(!a)return;S.modal={type:'perfilAluno',aid};render();}
function admCriarProf(){
  const{nome,email,senha}=S.editBuf;if(!nome?.trim()||!email?.trim()||!senha?.trim()){showToast('Preencha tudo.');return;}
  const id=uid();S.professores[id]={id,nome:nome.trim(),email:email.trim(),passHash:hash(senha),turmaId:null,status:'ativo'};
  save();closeModal();showToast('Professor criado!');
}
function compartilharWpp(aid){
  const t=getTurma();if(!t)return;const a=t.alunos.find(x=>x.id===aid);if(!a)return;
  const prof=getProf()||{nome:'Escola'};const lim=t.limiteFaltas||6;
  const hist=a.historico||[];const total=hist.filter(h=>h.tipo==='presente'||h.tipo==='ausente').length;
  const pres=hist.filter(h=>h.tipo==='presente').length;
  const freq=total>0?Math.round(pres/total*100):100;
  const obsRec=hist.filter(h=>h.tipo==='obs').slice(0,3);
  let msg=`${saudacao()}! 🎓\n\nEspero que esteja bem.\n\nAqui é *${prof.nome}*, professor(a) da turma *${t.nome}*.\n\nGostaria de transmitir algumas informações sobre *${a.nome}*:\n\n`;
  msg+=`📊 *Situação atual:*\n• Faltas: *${a.faltas}*${a.faltas>=lim?' ⚠️ (atingiu o limite)':''}\n• Frequência: *${freq}%*\n• Turma: ${t.nome}\n\n`;
  if(obsRec.length>0){msg+=`📝 *Observações recentes:*\n`;obsRec.forEach(o=>{msg+=`• ${o.texto} _(${o.data})_\n`;});msg+='\n';}
  if(a.obs){msg+=`📌 *Perfil:* ${a.obs}\n\n`;}
  msg+=`Qualquer dúvida estou à disposição. 😊\n\n_${prof.nome} — ${t.nome}_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}
function gerarPDF(aid){
  const t=getTurma();if(!t)return;const a=t.alunos.find(x=>x.id===aid);if(!a)return;
  const prof=getProf()||{nome:'Escola'};const lim=t.limiteFaltas||6;
  const hist=a.historico||[];const total=hist.filter(h=>h.tipo==='presente'||h.tipo==='ausente').length;
  const pres=hist.filter(h=>h.tipo==='presente').length;const freq=total>0?Math.round(pres/total*100):100;
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const W=210;let y=20;
    doc.setFillColor(15,110,86);doc.rect(0,0,W,32,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
    doc.text('Relatório Individual do Aluno',W/2,14,{align:'center'});
    doc.setFontSize(10);doc.setFont('helvetica','normal');

function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1D9E75',color:'#fff',padding:'9px 18px',borderRadius:'8px',fontSize:'13px',fontWeight:'700',zIndex:'999',transition:'opacity .3s',pointerEvents:'none',whiteSpace:'nowrap'});document.body.appendChild(t);}

}

        <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Adicionar observação</div>
        <div class="obs-input-row"><input id="nova-obs-${a.id}" type="text" placeholder="Digite uma observação..." onkeydown="if(event.key==='Enter'){adicionarObservacao('${a.id}',this.value);this.value=''}"><button onclick="adicionarObservacao('${a.id}',document.getElementById('nova-obs-${a.id}').value);document.getElementById('nova-obs-${a.id}').value=''">+</button></div>
        <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px">Histórico individual</div>
        <div class="timeline">${hist.length===0?'<div style="font-size:13px;color:#aaa;text-align:center;padding:12px">Nenhum registro ainda.</div>':''}${hist.slice(0,20).map(h=>{const icon=h.tipo==='presente'?'✓':h.tipo==='ausente'?'✗':'📝';const cls=h.tipo==='presente'?'tl-present':h.tipo==='ausente'?'tl-absent':'tl-obs';const txt=h.tipo==='presente'?'Presente':h.tipo==='ausente'?'Ausente':(h.texto||'Obs.');return`<div class="tl-item"><div class="tl-icon ${cls}">${icon}</div><div class="tl-body"><div class="tl-date">${h.data}</div><div class="tl-text">${txt}</div></div></div>`;}).join('')}</div>
        <button class="btn-wpp" onclick="compartilharWpp('${a.id}')"><span style="font-size:18px">💬</span> Compartilhar via WhatsApp</button>
        <button class="btn-pdf" onclick="gerarPDF('${a.id}')"><span style="font-size:18px">📄</span> Exportar PDF</button>
        <button class="btn-secondary" onclick="S.modal={type:'editAluno',aid:'${a.id}'};S.editBuf={nome:'${a.nome.replace(/'/g,"\\'")}',obs:decodeURIComponent('${encodeURIComponent(a.obs||'')}'),faltas:${a.faltas}};render()">✏️ Editar dados</button>`;
      }
    }
    if(m.type==='novoAluno'||m.type==='editAluno'){
      const isEdit=m.type==='editAluno';const a=isEdit?getTurma()?.alunos.find(x=>x.id===m.aid):null;const turmas2=S.authRole==='adm'?Object.values(S.turmas):[];
      mc=`<div class="modal-title">${isEdit?'Editar aluno':'Novo aluno'}<button class="cls" onclick="closeModal()">×</button></div>
        <div class="fl"><label>Nome *</label><input class="fi" value="${S.editBuf.nome||''}" placeholder="Nome" oninput="S.editBuf.nome=this.value"></div>
        <div class="fl"><label>Observações</label><textarea class="fi" placeholder="Saúde, comportamento, necessidades..." oninput="S.editBuf.obs=this.value">${S.editBuf.obs||''}</textarea></div>
        ${isEdit?`<div class="fl"><label>Faltas</label><input class="ni" type="number" min="0" value="${a?.faltas||0}" oninput="S.editBuf.faltas=this.value"></div>`:''}
        ${S.authRole==='adm'&&!isEdit?`<div class="fl"><label>Turma</label><select class="fi" onchange="S.editBuf.turmaId=this.value"><option value="">Selecione</option>${turmas2.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}</select></div>`:''}
        <button class="btn-primary" onclick="salvarAluno()">Salvar</button>
        ${isEdit?`<button class="btn-danger" onclick="removerAluno()">Remover</button>`:''}`;
    }
    if(m.type==='novaTurma'){const profs2=Object.values(S.professores).filter(p=>p.status==='ativo');mc=`<div class="modal-title">Nova turma<button class="cls" onclick="closeModal()">×</button></div><div class="fl"><label>Nome *</label><input class="fi" placeholder="Ex: 9º Ano A" oninput="S.editBuf.nome=this.value"></div><div class="fl"><label>Professor</label><select class="fi" onchange="S.editBuf.profId=this.value"><option value="">Sem professor</option>${profs2.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div><div class="fl"><label>Limite de faltas</label><input class="ni" type="number" min="1" value="6" oninput="S.editBuf.lim=this.value"></div><button class="btn-primary" onclick="criarTurma()">Criar</button>`;}
    if(m.type==='editTurma'){const t2=S.turmas[m.tid];const profs2=Object.values(S.professores).filter(p=>p.status==='ativo');mc=`<div class="modal-title">Editar turma<button class="cls" onclick="closeModal()">×</button></div><div class="fl"><label>Nome</label><input class="fi" value="${t2.nome}" oninput="S.turmas['${m.tid}'].nome=this.value;save()"></div><div class="fl"><label>Professor</label><select class="fi" onchange="atribuirProfTurma('${m.tid}',this.value)"><option value="">Sem professor</option>${profs2.map(p=>`<option value="${p.id}"${t2.profId===p.id?' selected':''}>${p.nome}</option>`).join('')}</select></div><div class="fl"><label>Limite faltas</label><input class="ni" type="number" min="1" value="${t2.limiteFaltas||6}" oninput="S.turmas['${m.tid}'].limiteFaltas=parseInt(this.value)||6;save()"></div><div class="fl"><label>🔗 Link do professor</label><div class="link-box" onclick="copyLink('${m.tid}')">Clique para copiar</div></div><button class="btn-primary" onclick="closeModal()">Fechar</button><button class="btn-danger" onclick="if(confirm('Remover?')){delete S.turmas['${m.tid}'];save();closeModal();}">Remover turma</button>`;}
    if(m.type==='editProf'){const p2=S.professores[m.pid];const turmas2=Object.values(S.turmas);mc=`<div class="modal-title">${p2.nome}<button class="cls" onclick="closeModal()">×</button></div><div class="fl"><label>Nome</label><input class="fi" value="${p2.nome}" oninput="S.professores['${m.pid}'].nome=this.value;save()"></div><div class="fl"><label>E-mail</label><input class="fi" value="${p2.email}" oninput="S.professores['${m.pid}'].email=this.value;save()"></div><div class="fl"><label>Turma</label><select class="fi" onchange="atribuirProfTurma(this.value,'${m.pid}')"><option value="">Sem turma</option>${turmas2.map(t=>`<option value="${t.id}"${p2.turmaId===t.id?' selected':''}>${t.nome}</option>`).join('')}</select></div><button class="btn-primary" onclick="resetarSenha('${m.pid}')">🔑 Resetar senha</button><button class="btn-danger" onclick="if(confirm('Remover?')){delete S.professores['${m.pid}'];save();closeModal();}">Remover</button>`;}
    if(m.type==='novoProf'){mc=`<div class="modal-title">Novo professor<button class="cls" onclick="closeModal()">×</button></div><div class="fl"><label>Nome *</label><input class="fi" oninput="S.editBuf.nome=this.value" placeholder="Nome completo"></div><div class="fl"><label>E-mail *</label><input class="fi" type="email" oninput="S.editBuf.email=this.value" placeholder="email@escola.com"></div><div class="fl"><label>Senha *</label><input class="fi" type="password" oninput="S.editBuf.senha=this.value" placeholder="Mín. 4 caracteres"></div><button class="btn-primary" onclick="admCriarProf()">Criar</button>`;}
    if(m.type==='senhaReset'){mc=`<div class="modal-title">🔑 Senha resetada<button class="cls" onclick="closeModal()">×</button></div><div style="font-size:13px;color:#666;margin-bottom:10px">Senha de <strong>${m.nome}</strong>:</div><div style="background:#f0faf6;border:1.5px dashed #1D9E75;border-radius:8px;padding:14px;text-align:center;font-size:24px;font-weight:700;color:#0a7a4e;letter-spacing:3px">${m.senha}</div><button class="btn-primary" onclick="closeModal()">Fechar</button>`;}
    if(mc)html+=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${mc}</div></div>`;
  }
  root.innerHTML=html;
}
loadData();
</script>
</body>
</html>
