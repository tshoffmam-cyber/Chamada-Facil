<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamada Fácil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f8;min-height:100vh;color:#111827}
.app{max-width:500px;margin:0 auto;padding:12px}
.app-header{background:#1a1a2e;border-radius:14px;padding:16px 18px;margin-bottom:10px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.page-title{font-size:16px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.sub-info{font-size:11px;color:#9ca3af;margin-top:3px}
.escola-info{font-size:11px;color:#5DCAA5;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:2px}
.stats-row.s3{grid-template-columns:1fr 1fr 1fr}
.stat{background:#16213e;border-radius:8px;padding:9px 10px;text-align:center}
.stat-num{font-size:19px;font-weight:700;color:#fff}
.stat-num.g{color:#5DCAA5}.stat-num.r{color:#F0997B}.stat-num.b{color:#85B7EB}
.stat-label{font-size:10px;color:#9ca3af;margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-bottom:10px}
.tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:11px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;font-weight:600;transition:all .15s}
.tab:hover{border-color:#1D9E75;color:#1D9E75}
.tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.btn-xs{font-size:12px;padding:5px 12px;border:1px solid #1D9E75;border-radius:8px;background:#fff;color:#1D9E75;cursor:pointer;font-weight:700}
.btn-xs:hover{background:#1D9E75;color:#fff}
.btn-primary{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;text-transform:uppercase;letter-spacing:.05em}
.btn-primary:hover{background:#0F6E56}
.btn-secondary{width:100%;padding:10px;background:#fff;color:#374151;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-secondary:hover{border-color:#1D9E75;color:#1D9E75}
.btn-danger{width:100%;padding:9px;background:#fff;color:#b03030;border:1px solid #fca5a5;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-wpp{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-pdf{width:100%;padding:12px;background:#e53e3e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;transition:all .15s}
.sc.clickable{cursor:pointer}.sc.clickable:hover{border-color:#1D9E75}
.sc.present-card{border-left:3px solid #1D9E75;background:#f0fdf8}
.sc.absent-card{border-left:3px solid #ef4444;background:#fff8f8}
.sc.justif-card{border-left:3px solid #3b82f6;background:#f0f7ff}
.sc.alert-card{border-left:3px solid #f59e0b}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av0{background:#1a1a2e;color:#5DCAA5}.av1{background:#16213e;color:#85B7EB}
.av2{background:#1a1a2e;color:#F0997B}.av3{background:#16213e;color:#AFA9EC}.av4{background:#1a1a2e;color:#FAC775}
.si{flex:1;min-width:0}
.sn{font-size:13px;font-weight:600;color:#111827}
.sm{font-size:11px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:6px}
.fb{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.fb.ok{background:#dcfce7;color:#166534}.fb.warn{background:#fef3c7;color:#92400e}.fb.bad{background:#fee2e2;color:#991b1b}
.chk{width:36px;height:36px;border-radius:50%;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#9ca3af;font-weight:700}
.chk.present{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chk.absent{background:#ef4444;border-color:#ef4444;color:#fff}
.chk.justif{background:#3b82f6;border-color:#3b82f6;color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(10,10,20,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:#111827;text-transform:uppercase;letter-spacing:.04em;padding-bottom:12px;border-bottom:1px solid #e5e7eb}
.cls{background:transparent;border:none;font-size:22px;cursor:pointer;color:#9ca3af;padding:2px 6px;line-height:1}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;color:#6b7280;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:10px 12px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#111827;font-family:inherit}
.fi:focus{outline:none;border-color:#1D9E75}
textarea.fi{resize:vertical;min-height:70px}
.ni{width:64px;padding:8px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;text-align:center}
.alert-banner{background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400e;font-weight:600}
.err{color:#dc2626;font-size:12px;margin-top:6px;text-align:center;font-weight:700;padding:8px;background:#fee2e2;border-radius:6px}
.hist-item{padding:10px 0;border-bottom:1px solid #f3f4f6}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px}
.rel-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px;color:#374151}
.rel-row:last-child{border:none}
.link-box{background:#f0fdf4;border:1px dashed #1D9E75;border-radius:8px;padding:8px 12px;font-size:11px;color:#0F6E56;word-break:break-all;margin-top:5px;cursor:pointer;font-weight:600}
.empty-state{text-align:center;padding:32px 16px;color:#9ca3af;font-size:13px}
.divider{border:none;border-top:1px solid #f3f4f6;margin:10px 0}
.beta-box{margin-top:16px;padding:14px;background:#f0fdf4;border-radius:10px;border:1.5px dashed #1D9E75}
.beta-title{font-size:10px;font-weight:700;color:#0F6E56;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.beta-btn{width:100%;text-align:center;padding:11px 12px;margin-bottom:7px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600;color:#111827}
.beta-btn:last-child{margin-bottom:0}
.beta-btn:hover{border-color:#1D9E75;color:#1D9E75}
.beta-hint{font-size:11px;color:#9ca3af}
.timeline{padding:4px 0}
.tl-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.tl-item:last-child{border:none}
.tl-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.tl-present{background:#dcfce7;color:#166534}.tl-absent{background:#fee2e2;color:#991b1b}
.tl-obs{background:#fef3c7;color:#92400e}.tl-justif{background:#dbeafe;color:#1e40af}
.tl-date{font-size:11px;color:#9ca3af;margin-bottom:2px}
.tl-text{font-size:13px;color:#111827}
.obs-input-row{display:flex;gap:8px;margin-top:10px}
.obs-input-row input{flex:1;padding:9px 12px;font-size:13px;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit}
.obs-input-row input:focus{outline:none;border-color:#1D9E75}
.obs-input-row button{padding:9px 16px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700}
.perfil-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.perfil-stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;text-align:center}
.perfil-stat-n{font-size:18px;font-weight:700;color:#111827}
.perfil-stat-l{font-size:10px;color:#6b7280;margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="app" id="root"><div class="empty-state">Carregando...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ── Configuração de Planos ───────────────────────────────────
const PLANOS={
  beta:   {id:'beta',   nome:'Beta',    preco:0,    maxEscolas:99,maxTurmas:99, temRelatorio:true,  temPDF:true,temWhatsapp:true},
  basico: {id:'basico', nome:'Básico',  preco:29.90,maxEscolas:1, maxTurmas:1,  temRelatorio:false, temPDF:true,temWhatsapp:true},
  plus:   {id:'plus',   nome:'Plus',    preco:59.90,maxEscolas:3, maxTurmas:3,  temRelatorio:true,  temPDF:true,temWhatsapp:true},
  diretor:{id:'diretor',nome:'Diretor', preco:89.90,maxEscolas:1, maxTurmas:99, temRelatorio:true,  temPDF:true,temWhatsapp:true,temVisaoProfessores:true}
};

// ── Suporte IA ───────────────────────────────────────────────
const ADM_WHATSAPP='5511999999999';
const ADM_EMAIL='suporte@chamadafacil.com.br';
const SUPORTE_SYSTEM=`Você é o assistente de suporte do Chamada Fácil, um app de controle de presença escolar.
Seu nome é "Fácil". Fale de forma próxima e informal, como um colega que conhece bem o sistema.
SOBRE O APP: professores fazem chamada digital, registram observações e geram PDFs/WhatsApp.
Planos: Beta (grátis), Básico R$29,90, Plus R$59,90, Diretor R$89,90.
Na chamada: 1 toque=presente(verde), 2=ausente(vermelho), 3=justificado(azul), 4=limpar.
REEMBOLSO: cancelamento livre, reembolso em até 7 dias, email: ${ADM_EMAIL}
Quando não souber: diga que vai encaminhar para o ADM humano.
Responda em português, curto e direto. Máximo 3 parágrafos.`;
let suporteHistorico=[];

// ── Chaves de storage ────────────────────────────────────────
const DATA_KEY='chamadafacil_v6';
const ADM_KEY='chamadafacil_adm_v6';

// ── Utilitários ──────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function initials(n){return(n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function nowStr(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function today(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}
function saudacao(){const h=new Date().getHours();return h>=5&&h<12?'Bom dia':h>=12&&h<18?'Boa tarde':'Boa noite'}
function getParam(k){try{return new URLSearchParams(window.location.search).get(k)}catch{return null}}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0}return h.toString(36)}
function fc(f,lim){if(f===0)return'ok';if(f>=lim)return'bad';if(f>=lim-2)return'warn';return'ok'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sanitizePDF(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x00-\x7F]/g,'?')}

// ── Storage ──────────────────────────────────────────────────
const storage={
  get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,v);return{value:v}}catch{return null}}
};

// ── Estado global ────────────────────────────────────────────
let S={
  screen:'loading',authRole:null,authProfId:null,
  turmaAtiva:null,tab:'chamada',modal:null,loginErr:'',
  suporteCarregando:false,
  admPassHash:hash('admin123'),
  turmas:{},professores:{},editBuf:{},profBuffer:{}
};

function doLogin(){tryLogin(S._lu||'',S._lp||'')}
function doRegister(){S.screen='register';S.loginErr='';S.profBuffer={};render()}
function logoSVG(size){
  size=size||40;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="10" fill="#1D9E75"/><path d="M10 21L17 28L30 13" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

// ── Auth ─────────────────────────────────────────────────────
function loadData(){
  try{
    var r1=storage.get(DATA_KEY);
    var r2=storage.get(ADM_KEY);
    if(r1&&r1.value){var d=JSON.parse(r1.value);S.turmas=d.turmas||{};S.professores=d.professores||{};}
    if(r2&&r2.value){S.admPassHash=r2.value;}
  }catch(e){console.error('loadData error',e)}
  var tid=getParam('turma');
  var sess=localStorage.getItem('auth_cf6');
  if(sess){
    try{
      var p=JSON.parse(sess);
      S.authRole=p.role;S.authProfId=p.profId;
      if(tid&&S.turmas[tid])S.turmaAtiva=tid;
      else if(p.role==='prof'){var pr=S.professores[p.profId];S.turmaAtiva=pr?pr.turmaId||null:null;}
      S.screen=(p.role==='adm'||p.role==='diretor')?'relatorio':'chamada';
    }catch(e){S.screen='login';}
  }else{
    if(tid&&S.turmas[tid])S.turmaAtiva=tid;
    S.screen='login';
  }
  render();
}

function save(){
  storage.set(DATA_KEY,JSON.stringify({turmas:S.turmas,professores:S.professores}));
  storage.set(ADM_KEY,S.admPassHash);
}

function setSession(role,profId){
  S.authRole=role;S.authProfId=profId||null;
  localStorage.setItem('auth_cf6',JSON.stringify({role:role,profId:profId||null}));
}
function logout(){
  S.authRole=null;S.authProfId=null;S.turmaAtiva=null;S.screen='login';
  localStorage.removeItem('auth_cf6');render();
}

function tryLogin(user,pass){
  S.loginErr='';
  if(!user||!pass){S.loginErr='Preencha usuário e senha.';render();return;}
  if(user.toLowerCase()==='adm'||user.toLowerCase()==='admin'){
    if(hash(pass)===S.admPassHash){setSession('adm',null);S.screen='relatorio';S.tab='relatorio';render();return;}
    S.loginErr='Senha incorreta.';render();return;
  }
  var prof=null;
  var profs=Object.values(S.professores);
  for(var i=0;i<profs.length;i++){if(profs[i].email.toLowerCase()===user.toLowerCase()){prof=profs[i];break;}}
  if(!prof){S.loginErr='Usuário não encontrado.';render();return;}
  if(prof.status==='pendente'){S.loginErr='Aguardando aprovação do ADM.';render();return;}
  if(hash(pass)!==prof.passHash){S.loginErr='Senha incorreta.';render();return;}
  setSession(prof.role||'prof',prof.id);
  S.turmaAtiva=prof.turmaId||null;
  S.screen=(prof.role==='diretor')?'relatorio':'chamada';
  S.tab='chamada';render();
}

function tryRegister(){
  var b=S.profBuffer;
  if(!b.nome||!b.nome.trim()||!b.email||!b.email.trim()||!b.senha||!b.senha.trim()){S.loginErr='Preencha todos os campos.';render();return;}
  if(b.senha!==b.senha2){S.loginErr='As senhas não coincidem.';render();return;}
  if(b.senha.length<4){S.loginErr='Mínimo 4 caracteres.';render();return;}
  var profs=Object.values(S.professores);
  for(var i=0;i<profs.length;i++){if(profs[i].email.toLowerCase()===b.email.toLowerCase()){S.loginErr='E-mail já cadastrado.';render();return;}}
  var id=uid();
  S.professores[id]={id:id,nome:b.nome.trim(),email:b.email.trim(),celular:b.celular||'',passHash:hash(b.senha),turmaId:b.turmaId||S.turmaAtiva||null,escola:b.escola||'',role:b.role||'prof',plano:'beta',status:'pendente',criado:nowStr()};
  save();S.loginErr='';S.screen='login';
  showToast('Cadastro enviado! Aguarde aprovação.');render();
}

function entrarDemo(tipo){
  if(tipo==='adm'){tryLogin('adm','admin123');return;}
  var EMAIL='professor@demo.com';
  var prof=null;
  var profs=Object.values(S.professores);
  for(var i=0;i<profs.length;i++){if(profs[i].email===EMAIL){prof=profs[i];break;}}
  if(!prof){
    var pid=uid();var tid=uid();
    S.turmas[tid]={id:tid,nome:'9º ANO A',escola:'Escola Demo',profId:pid,limiteFaltas:6,alunos:[
      {id:uid(),nome:'Ana Beatriz Costa',obs:'Muito participativa.',faltas:2,presente:null,cor:0,historico:[]},
      {id:uid(),nome:'Bruno Lima Santos',obs:'Dificuldades em álgebra.',faltas:5,presente:null,cor:1,historico:[]},
      {id:uid(),nome:'Carla Ferreira',obs:'Faltou várias vezes.',faltas:7,presente:null,cor:2,historico:[]},
      {id:uid(),nome:'Diego Souza',obs:'Transferido recentemente.',faltas:1,presente:null,cor:3,historico:[]},
      {id:uid(),nome:'Eduarda Mendes',obs:'TDAH diagnosticado.',faltas:0,presente:null,cor:4,historico:[]}
    ],history:[],criada:nowStr()};
    S.professores[pid]={id:pid,nome:'Prof. João Silva',email:EMAIL,celular:'(11) 98765-4321',passHash:hash('demo123'),turmaId:tid,escola:'Escola Demo',role:'prof',plano:'beta',status:'ativo',criado:nowStr()};
    save();
  }
  tryLogin(EMAIL,'demo123');
}

// ── Getters ──────────────────────────────────────────────────
function getProf(){return S.professores[S.authProfId]||null}
function getTurma(){
  if(S.authRole==='adm')return S.turmaAtiva?S.turmas[S.turmaAtiva]:null;
  var p=getProf();return(p&&p.turmaId)?S.turmas[p.turmaId]:null;
}

// ── Lógica chamada ───────────────────────────────────────────
function togglePresente(aid){
  var t=getTurma();if(!t)return;
  t.alunos=t.alunos.map(function(a){
    if(a.id!==aid)return a;
    var old=a.presente;
    var np=old===null?'P':old==='P'?'F':old==='F'?'J':null;
    var nf=a.faltas;
    if(old==='P'&&np==='F')nf++;
    if(old==='F'&&np==='J')nf=Math.max(0,nf-1);
    if(old==='F'&&np===null)nf=Math.max(0,nf-1);
    return Object.assign({},a,{presente:np,faltas:nf});
  });
  save();render();
}

function salvarChamada(){
  var t=getTurma();if(!t)return;
  var presentes=t.alunos.filter(function(a){return a.presente==='P'});
  var ausentes=t.alunos.filter(function(a){return a.presente==='F'});
  var justific=t.alunos.filter(function(a){return a.presente==='J'});
  if(!presentes.length&&!ausentes.length&&!justific.length){showToast('Marque ao menos um aluno.');return;}
  var dataAtual=nowStr();
  t.history.unshift({id:uid(),data:dataAtual,presentes:presentes.map(function(a){return a.nome}),ausentes:ausentes.map(function(a){return a.nome}),justific:justific.map(function(a){return a.nome}),total:t.alunos.length});
  if(t.history.length>60)t.history=t.history.slice(0,60);
  t.alunos=t.alunos.map(function(a){
    if(a.presente===null)return a;
    var tipo=a.presente==='P'?'presente':a.presente==='F'?'ausente':'justificado';
    var entrada={tipo:tipo,data:dataAtual};
    var hist=[entrada].concat(a.historico||[]).slice(0,100);
    return Object.assign({},a,{presente:null,historico:hist});
  });
  save();render();showToast('Chamada salva!');
}

function adicionarObservacao(aid,texto){
  if(!texto||!texto.trim())return;
  var t=getTurma();if(!t)return;
  t.alunos=t.alunos.map(function(a){
    if(a.id!==aid)return a;
    var entrada={tipo:'obs',data:nowStr(),texto:texto.trim()};
    var hist=[entrada].concat(a.historico||[]).slice(0,100);
    return Object.assign({},a,{historico:hist});
  });

function compartilharWpp(aid){
  var t=getTurma();if(!t)return;

            +'<div class="si"><div class="sn">'+esc(p.nome)+'</div><div class="sm">'+esc(p.email)+(p.escola?' · '+esc(p.escola):'')+'</div></div>'
            +'<div style="display:flex;gap:5px"><button class="btn-xs" style="color:#0a7a4e;border-color:#1D9E75" onclick="aprovarProf(\''+p.id+'\')">✓</button>'
            +'<button class="btn-xs" style="color:#b03030;border-color:#fca5a5" onclick="rejeitarProf(\''+p.id+'\')">✗</button></div></div>';
        });
        html+='<hr class="divider">';
      }
      html+='<div class="sec-hdr"><span class="sec-title">Ativos</span>'+(S.authRole==='adm'?'<button class="btn-xs" onclick="S.modal={type:\'novoProf\'};S.editBuf={};render()">+ Novo</button>':'<span style="font-size:11px;color:#9ca3af">Professores vinculados</span>')+'</div>';
      var ativosArr=S.authRole==='diretor'
        ?profs.filter(function(p){var gp=getProf();return p.status==='ativo'&&p.role==='prof'&&gp&&p.escola&&p.escola.toLowerCase()===gp.escola.toLowerCase()})
        :profs.filter(function(p){return p.status==='ativo'});
      if(!ativosArr.length)html+='<div class="empty-state">Nenhum professor ativo.</div>';
      ativosArr.forEach(function(p){
        var turma=p.turmaId?S.turmas[p.turmaId]:null;
        var badge='<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:#dbeafe;color:#1e40af;font-weight:700;text-transform:uppercase">'+(PLANOS[p.plano||'beta']?PLANOS[p.plano||'beta'].nome:'Beta')+'</span>';
        html+='<div class="sc clickable" onclick="S.modal={type:\'editProf\',pid:\''+p.id+'\'};render()">'
          +'<div class="av av1">'+initials(p.nome)+'</div>'
          +'<div class="si"><div class="sn">'+esc(p.nome)+(p.role==='diretor'?' <span style="font-size:10px;color:#5b21b6;font-weight:700">(DIR)</span>':'')+'</div>'
          +'<div class="sm">'+esc(p.email)+(p.celular?' <span>📱 '+esc(p.celular)+'</span>':'')+(turma?' · '+esc(turma.nome):'')+'</div></div>'+badge+'</div>';
      });
    }

    if(S.tab==='config'&&S.authRole==='adm'){
      html+='<div class="card"><div class="sec-title" style="margin-bottom:12px">🔐 Senha ADM</div>'
        +'<div class="fl"><label>Nova Senha</label><input class="fi" type="password" id="np1" placeholder="Mínimo 4 caracteres"></div>'
        +'<div class="fl"><label>Confirmar</label><input class="fi" type="password" id="np2" placeholder="Repita"></div>'
        +'<button class="btn-primary" onclick="trocarSenhaAdm()">Alterar Senha ADM</button></div>';
    }

    if(S.tab==='suporte'){
      // Reutiliza o suporte da tela de chamada
      S.screen='chamada';S.tab='suporte';render();return;
    }
  }

  // MODAIS
  if(S.modal){
    var mc='';var m=S.modal;

    if(m.type==='perfilAluno'){
      var t=getTurma();var a=t?t.alunos.find(function(x){return x.id===m.aid}):null;
      if(a){
        var lim=t.limiteFaltas||6;var hist=a.historico||[];
        var totalH=hist.filter(function(h){return h.tipo==='presente'||h.tipo==='ausente'}).length;
        var presH=hist.filter(function(h){return h.tipo==='presente'}).length;
        var freq=totalH>0?Math.round(presH/totalH*100):100;
        mc='<div class="modal-title"><div style="display:flex;align-items:center;gap:10px"><div class="av av'+a.cor%5+'" style="width:40px;height:40px;font-size:14px">'+initials(a.nome)+'</div>'
          +'<div><div>'+esc(a.nome)+'</div><div style="font-size:11px;color:#9ca3af;font-weight:400;text-transform:none">'+(t.nome+(t.escola?' — '+t.escola:''))+'</div></div></div>'
          +'<button class="cls" onclick="closeModal()">×</button></div>'
          +'<div class="perfil-stats"><div class="perfil-stat"><div class="perfil-stat-n" style="color:'+(a.faltas>=lim?'#b03030':'#111827')+'">'+a.faltas+'</div><div class="perfil-stat-l">Faltas</div></div>'
          +'<div class="perfil-stat"><div class="perfil-stat-n" style="color:'+(freq>=75?'#0a7a4e':'#b03030')+'">'+freq+'%</div><div class="perfil-stat-l">Frequência</div></div>'
          +'<div class="perfil-stat"><div class="perfil-stat-n">'+totalH+'</div><div class="perfil-stat-l">Aulas</div></div></div>'
          +(a.faltas>=lim?'<div style="background:#fee2e2;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;margin-bottom:12px;font-weight:700">⚠️ Atingiu o limite de '+lim+' faltas!</div>':'')
          +(a.obs?'<div style="background:#f9fafb;border-radius:8px;padding:10px 12px;font-size:12px;color:#374151;margin-bottom:12px"><strong>PERFIL:</strong> '+esc(a.obs)+'</div>':'')
          +'<div class="sec-title" style="margin-bottom:6px">Adicionar Observação</div>'
          +'<div class="obs-input-row"><input id="no-'+a.id+'" type="text" placeholder="Digite uma observação..." onkeydown="if(event.key===\'Enter\'){adicionarObservacao(\''+a.id+'\',this.value);this.value=\'\'}">'
          +'<button onclick="adicionarObservacao(\''+a.id+'\',document.getElementById(\'no-'+a.id+'\').value);document.getElementById(\'no-'+a.id+'\').value=\'\'">+</button></div>'
          +'<div class="sec-title" style="margin:14px 0 6px">Histórico Individual</div>'
          +'<div class="timeline">'
          +(hist.length===0?'<div style="font-size:13px;color:#9ca3af;text-align:center;padding:12px">Nenhum registro ainda.</div>':'')
          +hist.slice(0,20).map(function(h){
            var icon=h.tipo==='presente'?'✓':h.tipo==='ausente'?'✗':h.tipo==='justificado'?'J':'📝';
            var cls=h.tipo==='presente'?'tl-present':h.tipo==='ausente'?'tl-absent':h.tipo==='justificado'?'tl-justif':'tl-obs';
            var txt=h.tipo==='presente'?'Presente':h.tipo==='ausente'?'Ausente':h.tipo==='justificado'?'<span style="color:#3b82f6;font-weight:600">Falta justificada</span>':(esc(h.texto)||'Obs.');
            return'<div class="tl-item"><div class="tl-icon '+cls+'">'+icon+'</div><div><div class="tl-date">'+h.data+'</div><div class="tl-text">'+txt+'</div></div></div>';
          }).join('')+'</div>'
          +'<button class="btn-wpp" onclick="compartilharWpp(\''+a.id+'\')"><span>💬</span> Compartilhar via WhatsApp</button>'
          +'<button class="btn-pdf" onclick="gerarPDF(\''+a.id+'\')"><span>📄</span> Exportar PDF</button>'
          +'<button class="btn-secondary" onclick="S.modal={type:\'editAluno\',aid:\''+a.id+'\'};S.editBuf={nome:\''+a.nome.replace(/'/g,"\\'")+'\'};render()">✏️ Editar Dados</button>';
      }
    }

    if(m.type==='novoAluno'||m.type==='editAluno'){
      var isEdit=m.type==='editAluno';
      var a2=isEdit&&getTurma()?getTurma().alunos.find(function(x){return x.id===m.aid}):null;
      var turmas2=S.authRole==='adm'?Object.values(S.turmas):[];
      mc='<div class="modal-title">'+(isEdit?'Editar Aluno':'Novo Aluno')+'<button class="cls" onclick="closeModal()">×</button></div>'
        +'<div class="fl"><label>Nome *</label><input class="fi" value="'+esc(S.editBuf.nome||'')+'" placeholder="Nome do aluno" oninput="S.editBuf.nome=this.value"></div>'
        +'<div class="fl"><label>Observações</label><textarea class="fi" placeholder="Saúde, comportamento, necessidades especiais..." oninput="S.editBuf.obs=this.value">'+(S.editBuf.obs||'')+'</textarea></div>'
        +(isEdit&&a2?'<div class="fl"><label>Faltas</label><input class="ni" type="number" min="0" value="'+(a2.faltas||0)+'" oninput="S.editBuf.faltas=this.value"></div>':'')
        +(S.authRole==='adm'&&!isEdit?'<div class="fl"><label>Turma</label><select class="fi" onchange="S.editBuf.turmaId=this.value"><option value="">Selecione</option>'+turmas2.map(function(t){return'<option value="'+t.id+'">'+esc(t.nome)+(t.escola?' — '+t.escola:'')+'</option>'}).join('')+'</select></div>':'')
        +'<button class="btn-primary" onclick="salvarAluno()">Salvar</button>'
        +(isEdit?'<button class="btn-danger" onclick="removerAluno()">Remover Aluno</button>':'');
    }

    if(m.type==='novaTurma'){
      var ps=Object.values(S.professores).filter(function(p){return p.status==='ativo'});
      mc='<div class="modal-title">Nova Turma<button class="cls" onclick="closeModal()">×</button></div>'
        +'<div class="fl"><label>Nome / Ano *</label><input class="fi" placeholder="Ex: 9º ANO A" oninput="S.editBuf.nome=this.value"></div>'
        +'<div class="fl"><label>Escola</label><input class="fi" placeholder="E.E. Nome da Escola" oninput="S.editBuf.escola=this.value"></div>'
        +'<div class="fl"><label>Professor</label><select class="fi" onchange="S.editBuf.profId=this.value"><option value="">Sem professor ainda</option>'+ps.map(function(p){return'<option value="'+p.id+'">'+esc(p.nome)+'</option>'}).join('')+'</select></div>'
        +'<div class="fl"><label>Limite de Faltas</label><input class="ni" type="number" min="1" value="6" oninput="S.editBuf.lim=this.value"></div>'
        +'<button class="btn-primary" onclick="criarTurma()">Criar Turma</button>';
    }

    if(m.type==='editTurma'){
      var t3=S.turmas[m.tid];var ps2=Object.values(S.professores).filter(function(p){return p.status==='ativo'});
      mc='<div class="modal-title">Editar Turma<button class="cls" onclick="closeModal()">×</button></div>'
        +'<div class="fl"><label>Nome</label><input class="fi" value="'+esc(t3.nome)+'" oninput="S.turmas[\''+m.tid+'\'].nome=this.value.toUpperCase();save()"></div>'
        +'<div class="fl"><label>Escola</label><input class="fi" value="'+esc(t3.escola||'')+'" oninput="S.turmas[\''+m.tid+'\'].escola=this.value;save()"></div>'
        +'<div class="fl"><label>Professor</label><select class="fi" onchange="atribuirProfTurma(\''+m.tid+'\',this.value)"><option value="">Sem professor</option>'+ps2.map(function(p){return'<option value="'+p.id+'"'+(t3.profId===p.id?' selected':'')+'>'+esc(p.nome)+'</option>'}).join('')+'</select></div>'
        +'<div class="fl"><label>Limite Faltas</label><input class="ni" type="number" min="1" value="'+(t3.limiteFaltas||6)+'" oninput="S.turmas[\''+m.tid+'\'].limiteFaltas=parseInt(this.value)||6;save()"></div>'
        +'<div class="fl"><label>🔗 Link do Professor</label><div class="link-box" onclick="copyLink(\''+m.tid+'\')">Toque para copiar o link</div></div>'
        +'<button class="btn-primary" onclick="closeModal()">Fechar</button>'
        +'<button class="btn-danger" onclick="if(confirm(\'Remover turma?\')){{delete S.turmas[\''+m.tid+'\'];save();closeModal();}}">Remover Turma</button>';
    }

    if(m.type==='editProf'){
      var p3=S.professores[m.pid];var ts=Object.values(S.turmas);var isADM=S.authRole==='adm';
      mc='<div class="modal-title">'+esc(p3.nome)+'<button class="cls" onclick="closeModal()">×</button></div>'
        +(isADM
          ?'<div class="fl"><label>Nome</label><input class="fi" value="'+esc(p3.nome)+'" oninput="S.professores[\''+m.pid+'\'].nome=this.value;save()"></div>'
          +'<div class="fl"><label>E-mail</label><input class="fi" value="'+esc(p3.email)+'" oninput="S.professores[\''+m.pid+'\'].email=this.value;save()"></div>'
          +'<div class="fl"><label>Celular</label><input class="fi" type="tel" value="'+esc(p3.celular||'')+'" oninput="S.professores[\''+m.pid+'\'].celular=this.value;save()" maxlength="15"></div>'
          +'<div class="fl"><label>Escola</label><input class="fi" value="'+esc(p3.escola||'')+'" oninput="S.professores[\''+m.pid+'\'].escola=this.value;save()"></div>'
          +'<div class="fl"><label>Plano</label><select class="fi" onchange="S.professores[\''+m.pid+'\'].plano=this.value;save()">'+Object.values(PLANOS).map(function(pl){return'<option value="'+pl.id+'"'+((p3.plano||'beta')===pl.id?' selected':'')+'>'+pl.nome+(pl.preco>0?' — R$ '+pl.preco.toFixed(2).replace('.',','):' (Grátis)')+'</option>'}).join('')+'</select></div>'
          +'<div class="fl"><label>Turma</label><select class="fi" onchange="atribuirProfTurma(this.value,\''+m.pid+'\')"><option value="">Sem turma</option>'+ts.map(function(t){return'<option value="'+t.id+'"'+(p3.turmaId===t.id?' selected':'')+'>'+esc(t.nome)+'</option>'}).join('')+'</select></div>'
          :'<div style="background:#f9fafb;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px">'
          +'<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#6b7280">E-mail</span><span>'+esc(p3.email)+'</span></div>'
          +(p3.celular?'<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#6b7280">Celular</span><span>'+esc(p3.celular)+'</span></div>':'')
          +'<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#6b7280">Escola</span><span>'+esc(p3.escola||'—')+'</span></div>'
          +'<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#6b7280">Plano</span><span>'+(PLANOS[p3.plano||'beta']?PLANOS[p3.plano||'beta'].nome:'Beta')+'</span></div></div>')
        +(p3.celular?'<a href="https://wa.me/55'+p3.celular.replace(/\D/g,'')+'" target="_blank" class="btn-wpp" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px"><span>💬</span> Chamar no WhatsApp</a>':'')
        +(isADM?'<button class="btn-primary" style="margin-top:8px" onclick="resetarSenha(\''+m.pid+'\')">🔑 Resetar Senha</button>'
          +'<button class="btn-danger" onclick="if(confirm(\'Remover?\')){{delete S.professores[\''+m.pid+'\'];save();closeModal();}}">Remover</button>'
          :'<button class="btn-secondary" style="margin-top:4px" onclick="closeModal()">Fechar</button>');
    }

    if(m.type==='novoProf'){
      mc='<div class="modal-title">Novo Professor<button class="cls" onclick="closeModal()">×</button></div>'
        +'<div class="fl"><label>Nome *</label><input class="fi" oninput="S.editBuf.nome=this.value" placeholder="Nome completo"></div>'
        +'<div class="fl"><label>E-mail *</label><input class="fi" type="email" oninput="S.editBuf.email=this.value" placeholder="email@escola.com"></div>'
        +'<div class="fl"><label>Celular</label><input class="fi" type="tel" oninput="S.editBuf.celular=this.value" placeholder="(11) 99999-9999" maxlength="15"></div>'
        +'<div class="fl"><label>Escola</label><input class="fi" oninput="S.editBuf.escola=this.value" placeholder="Nome da escola"></div>'
        +'<div class="fl"><label>Tipo</label><select class="fi" onchange="S.editBuf.role=this.value"><option value="prof">Professor</option><option value="diretor">Diretor</option></select></div>'
        +'<div class="fl"><label>Senha *</label><input class="fi" type="password" oninput="S.editBuf.senha=this.value" placeholder="Mínimo 4 caracteres"></div>'
        +'<button class="btn-primary" onclick="admCriarProf()">Criar Professor</button>';
    }

    if(m.type==='senhaReset'){
      mc='<div class="modal-title">🔑 Senha Resetada<button class="cls" onclick="closeModal()">×</button></div>'
        +'<div style="font-size:13px;color:#6b7280;margin-bottom:10px">Senha provisória de <strong>'+esc(m.nome)+'</strong>:</div>'
        +'<div style="background:#f0fdf4;border:1.5px dashed #1D9E75;border-radius:8px;padding:14px;text-align:center;font-size:24px;font-weight:700;color:#0F6E56;letter-spacing:3px">'+m.senha+'</div>'
        +'<button class="btn-primary" onclick="closeModal()">Fechar</button>';
    }

    if(mc)html+='<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">'+mc+'</div></div>';
  }

  root.innerHTML=html;
}

loadData();
</script>
</body>
</html>
